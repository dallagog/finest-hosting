<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Statistics – Mobile 0.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="js/dashboard-shared.js"></script>
    <link rel="icon" type="image/png" href="images/icon-finest.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        :root {
            --bg: #f5f7fa;
            --white: #ffffff;
            --border: #e8ecf1;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --accent: #2563eb;
            --accent-light: #dbeafe;
            --red: #dc2626;
            --red-light: #fee2e2;
            --green: #16a34a;
            --green-light: #dcfce7;
            --orange: #f59e0b;
            --orange-light: #fef3c7;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --header-h: 60px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: calc(20px + var(--safe-bottom));
            overflow-x: hidden;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        /* ── TOP HEADER ── */
        .top-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .top-header .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-header .brand .logo {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 14px;
        }

        .top-header .brand h1 {
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .top-header .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .top-header .user-badge .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--accent-light);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .top-header .user-badge .user-info {
            display: none;
            flex-direction: column;
            align-items: flex-end;
            font-size: 0.65rem;
            color: var(--text-secondary);
            line-height: 1.3;
        }

        .top-header .user-badge .user-info strong {
            color: var(--text);
            font-size: 0.7rem;
        }

        .close-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--red-light);
            border: none;
            color: var(--red);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .close-btn:active {
            transform: scale(0.92);
        }

        /* ── MESSAGE ── */
        .message {
            margin: 12px 16px 0;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.78rem;
            font-weight: 500;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .message.error {
            background: var(--red-light);
            color: var(--red);
            display: block;
        }

        .message.warning {
            background: var(--orange-light);
            color: var(--orange);
            display: block;
        }

        .message.info {
            background: var(--accent-light);
            color: var(--accent);
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── FILTER PANEL ── */
        .filter-panel {
            margin: 12px 16px 0;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .filter-toggle {
            width: 100%;
            background: none;
            border: none;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text);
            transition: background 0.2s;
        }

        .filter-toggle:active {
            background: var(--bg);
        }

        .filter-toggle .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-toggle .left i {
            color: var(--accent);
            font-size: 14px;
        }

        .filter-toggle .badge-count {
            background: var(--accent);
            color: white;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: 12px;
            min-width: 20px;
            text-align: center;
        }

        .filter-toggle .arrow {
            transition: transform 0.3s ease;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .filter-toggle.open .arrow {
            transform: rotate(180deg);
        }

        .filter-body {
            display: none;
            padding: 0 18px 18px;
            flex-direction: column;
            gap: 14px;
        }

        .filter-body.open {
            display: flex;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-group label {
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.82rem;
            background: var(--white);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .date-row,
        .force-row {
            display: flex;
            gap: 10px;
        }

        .date-row .filter-group,
        .force-row .filter-group {
            flex: 1;
        }

        /* Inversion checkbox */
        .inversion-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 4px 0;
        }

        .inversion-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
            border-radius: 4px;
        }

        .inversion-row label {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            user-select: none;
        }

        /* Sector dropdown */
        .dropdown-check-list {
            position: relative;
            width: 100%;
        }

        .dropdown-check-list .anchor {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--white);
            font-family: inherit;
            font-size: 0.82rem;
            cursor: pointer;
            transition: border-color 0.2s;
            color: var(--text);
        }

        .dropdown-check-list .anchor:active {
            border-color: var(--accent);
        }

        .dropdown-check-list .anchor .arrow-down {
            font-size: 10px;
            color: var(--text-secondary);
            transition: transform 0.2s;
        }

        .dropdown-check-list.visible .anchor .arrow-down {
            transform: rotate(180deg);
        }

        .dropdown-check-list .items {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            z-index: 200;
            background: var(--white);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            max-height: 200px;
            overflow-y: auto;
            padding: 6px;
        }

        .dropdown-check-list.visible .items {
            display: block;
        }

        .dropdown-check-list .items label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            font-size: 0.78rem;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text);
            transition: background 0.15s;
        }

        .dropdown-check-list .items label:hover {
            background: var(--bg);
        }

        .dropdown-check-list .items label:active {
            background: var(--accent-light);
        }

        .dropdown-check-list input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            margin: 0;
            flex-shrink: 0;
        }

        /* Instrument search */
        .instrument-search-wrapper {
            position: relative;
            width: 100%;
        }

        .instrument-search-field {
            width: 100%;
            padding: 10px 36px 10px 40px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.82rem;
            background: var(--white);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .instrument-search-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .instrument-search-field::placeholder {
            color: var(--text-muted);
        }

        .instrument-search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
        }

        .instrument-search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 14px;
            display: none;
            background: none;
            border: none;
            padding: 4px;
            line-height: 1;
            transition: color 0.2s;
        }

        .instrument-search-clear:hover {
            color: var(--text);
        }

        .instrument-search-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: var(--white);
            border: 1.5px solid var(--border);
            border-top: none;
            z-index: 300;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            border-radius: 0 0 var(--radius-sm) var(--radius-sm);
            display: none;
        }

        .inst-item {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 2px;
            transition: background 0.15s;
        }

        .inst-item:last-child {
            border-bottom: none;
        }

        .inst-item:hover,
        .inst-item.active {
            background: var(--bg);
        }

        .inst-item-main {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .inst-item-id {
            font-weight: 700;
            color: var(--text);
            font-size: 0.82rem;
        }

        .inst-item-desc {
            font-size: 0.72rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .inst-item-empty {
            padding: 14px 12px;
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.78rem;
            text-align: center;
        }

        /* Apply button */
        .apply-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
        }

        .apply-btn:active {
            transform: scale(0.97);
            background: #1d4ed8;
        }

        /* ── RESULTS HEADER ── */
        .results-header {
            margin: 16px 16px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 4px;
        }

        .results-header .count {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .results-header .count strong {
            color: var(--text);
            font-size: 0.85rem;
        }

        .results-header .view-options {
            display: flex;
            gap: 4px;
        }

        .results-header .view-options button {
            padding: 4px 10px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            background: var(--white);
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .results-header .view-options button.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .results-header .view-options button:active {
            transform: scale(0.95);
        }

        /* ── CARD LIST ── */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 10px 16px 0;
            padding-bottom: 10px;
        }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .stat-card:active {
            transform: scale(0.98);
            box-shadow: var(--shadow-hover);
        }

        .stat-card .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .stat-card .card-header .left {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            min-width: 0;
        }

        .stat-card .card-id {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.3px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .stat-card .card-id:active {
            color: var(--accent);
        }

        .stat-card .card-desc {
            font-size: 0.72rem;
            color: var(--text-secondary);
            cursor: pointer;
            line-height: 1.4;
            transition: color 0.2s;
        }

        .stat-card .card-desc:active {
            color: var(--text);
        }

        .stat-card .card-date {
            font-size: 0.6rem;
            color: var(--text-muted);
            white-space: nowrap;
            padding: 2px 8px;
            background: var(--bg);
            border-radius: 12px;
            flex-shrink: 0;
        }

        /* Badges row */
        .stat-card .card-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .stat-card .badge {
            font-size: 0.55rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .badge-sector {
            background: var(--accent-light);
            color: var(--accent);
        }

        .badge-market {
            background: #f3e8ff;
            color: #7c3aed;
        }

        .badge-currency {
            background: #ecfdf5;
            color: #059669;
        }

        /* Metrics grid */
        .stat-card .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 8px;
            padding-top: 10px;
            border-top: 1.5px solid var(--border);
        }

        .stat-card .metric-item {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .stat-card .metric-item .label {
            font-size: 0.55rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .stat-card .metric-item .value {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text);
        }

        .stat-card .metric-item .value.positive {
            color: var(--green);
        }

        .stat-card .metric-item .value.negative {
            color: var(--red);
        }

        .stat-card .metric-item .value .sub {
            font-size: 0.55rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-left: 2px;
        }

        /* Fundamentals row */
        .stat-card .fundamentals {
            display: flex;
            gap: 12px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .stat-card .fund-item {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .stat-card .fund-item .label {
            font-size: 0.5rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .stat-card .fund-item .value {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text);
        }

        /* Loading state */
        .loading-text {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.82rem;
            padding: 60px 20px;
        }

        .loading-text i {
            font-size: 2rem;
            display: block;
            margin-bottom: 12px;
            color: var(--border);
        }

        .loading-text .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--border);
            margin-bottom: 12px;
        }

        .empty-state h3 {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .empty-state p {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* ── PULL TO REFRESH ── */
        .pull-indicator {
            text-align: center;
            font-size: 0.6rem;
            color: var(--text-muted);
            padding: 8px 0;
            display: none;
        }

        /* ── RESPONSIVE ── */
        @media (min-width: 480px) {
            .stat-card .metrics-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 640px) {
            body {
                padding: 20px 40px;
            }

            .top-header .user-badge .user-info {
                display: flex;
            }

            .card-list {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
        }

        @media (min-width: 1024px) {
            body {
                padding: 24px 60px;
            }

            .card-list {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }

        /* ── DARK MODE SUPPORT ── */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f1a;
                --white: #1a1a2e;
                --border: #2a2a44;
                --text: #e8e8f0;
                --text-secondary: #9ca3af;
                --text-muted: #6b7280;
                --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
                --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.4);
                --accent-light: #1e3a5f;
            }

            .top-header {
                background: rgba(26, 26, 46, 0.92);
            }

            .top-header .brand h1 {
                background: linear-gradient(135deg, #e8e8f0, #60a5fa);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            .filter-group input,
            .filter-group select,
            .dropdown-check-list .anchor,
            .instrument-search-field {
                background: #14142a;
                color: #e8e8f0;
            }

            .filter-group input::placeholder {
                color: #4a4a6a;
            }

            .stat-card .card-date {
                background: #14142a;
            }

            .dropdown-check-list .items {
                background: #1a1a2e;
                border-color: #2a2a44;
            }

            .instrument-search-dropdown {
                background: #1a1a2e;
                border-color: #2a2a44;
            }

            .inst-item {
                border-color: #2a2a44;
            }

            .inst-item:hover,
            .inst-item.active {
                background: #14142a;
            }

            .results-header .view-options button {
                background: #14142a;
                border-color: #2a2a44;
                color: var(--text-secondary);
            }

            .results-header .view-options button.active {
                background: var(--accent);
                color: white;
            }
        }
    </style>
</head>

<body>

    <!-- TOP HEADER -->
    <header class="top-header">
        <div class="brand">
            <div class="logo">📊</div>
            <h1>Statistics</h1>
        </div>
        <div class="user-badge">
            <div class="user-info">
                <strong id="usernameDisplay">-</strong>
                <span id="currencyDisplay">-</span>
                <span id="dateCreationDisplay"
                    style="font-size: 0.55rem; color: var(--text-muted); display: none;"></span>
            </div>
            <div class="avatar" id="avatarLetter">U</div>
            <button class="close-btn" onclick="closeDashboard()" aria-label="Chiudi">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </header>

    <div id="message" class="message"></div>

    <!-- FILTER PANEL -->
    <div class="filter-panel" id="filterPanel">
        <button class="filter-toggle" id="filterToggleBtn" onclick="toggleFilters()">
            <span class="left">
                <i class="fas fa-sliders-h"></i>
                <span>Filtri</span>
                <span class="badge-count" id="filterBadge" style="display:none;">0</span>
            </span>
            <span class="arrow">▾</span>
        </button>
        <div class="filter-body open" id="filterBody">

            <div class="date-row">
                <div class="filter-group">
                    <label>Dal</label>
                    <input type="date" id="date-start">
                </div>
                <div class="filter-group">
                    <label>Al</label>
                    <input type="date" id="date-end">
                </div>
            </div>

            <div class="force-row">
                <div class="filter-group">
                    <label>Forza min</label>
                    <input type="number" id="value-min" step="0.01" placeholder="0">
                </div>
                <div class="filter-group">
                    <label>Forza max</label>
                    <input type="number" id="value-max" step="0.01" placeholder="∞">
                </div>
            </div>

            <div class="filter-group">
                <label>Settore</label>
                <div id="sector-filter-container" class="dropdown-check-list">
                    <span class="anchor" onclick="toggleSectorDropdown()" id="sectorSelectorAnchor">
                        <span>Tutti i settori</span>
                        <span class="arrow-down">▾</span>
                    </span>
                    <div id="sectorSelectorItems" class="items"></div>
                </div>
            </div>

            <div class="filter-group">
                <label>Strumento</label>
                <div class="instrument-search-wrapper">
                    <span class="instrument-search-icon"><i class="fas fa-search"></i></span>
                    <input type="text" id="instrument-search-input" class="instrument-search-field"
                        placeholder="Cerca per codice o nome..." autocomplete="off">
                    <button type="button" class="instrument-search-clear" id="instrument-search-clear"
                        aria-label="Cancella">✕</button>
                    <div class="instrument-search-dropdown" id="instrument-search-dropdown"></div>
                </div>
                <input type="hidden" id="instrument-filter" value="">
            </div>

            <div class="inversion-row">
                <input type="checkbox" id="inversion-filter">
                <label for="inversion-filter" data-translate="int.inversion">Solo inversione</label>
            </div>

            <button class="apply-btn" onclick="fetchMarketData()">
                <i class="fas fa-arrow-right"></i>
                <span data-translate="int.apply">Applica</span>
            </button>
        </div>
    </div>

    <!-- RESULTS -->
    <div class="results-header" id="resultsHeader" style="display:none;">
        <span class="count"><strong id="resultsCount">0</strong> strumenti</span>
        <div class="view-options">
            <button class="active" onclick="setView('cards')" id="viewCards"><i class="fas fa-th"></i></button>
            <button onclick="setView('list')" id="viewList"><i class="fas fa-list"></i></button>
        </div>
    </div>

    <div class="card-list" id="cardList">
        <div class="loading-text">
            <div class="spinner"></div>
            Caricamento dati...
        </div>
    </div>

    <div class="pull-indicator" id="pullIndicator">⬇ Tira per aggiornare</div>

    <script>
        const API_URL_MARKET = "https://market-tunnel.fe-web.eu";

        const credentials = {
            username: localStorage.getItem('username'),
            token: localStorage.getItem('token'),
            currency: localStorage.getItem('currency') || 'EUR',
            date_start: localStorage.getItem('date_start') || '',
            date_end: localStorage.getItem('date_end') || '',
            language: localStorage.getItem('language') || 'it_IT'
        };

        let translations = {};
        let _lastData = [];
        let _selectedSectors = [];
        let _currentView = 'cards';
        let _filterCount = 0;

        // ── TRANSLATIONS ──────────────────────────────────────────────
        async function loadTranslations() {
            try {
                const resp = await fetch(`lang/${credentials.language}.json`);
                if (resp.ok) {
                    translations = await resp.json();
                    applyTranslations();
                }
            } catch (err) { console.error("Translations error:", err); }
        }

        function getTranslation(key) { return translations[key] || key; }

        function applyTranslations() {
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                const translation = getTranslation(key);
                if (translation && translation !== key) {
                    el.textContent = translation;
                }
            });
        }

        // ── INIT ──────────────────────────────────────────────────────
        async function init() {
            if (!credentials.username) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('usernameDisplay').textContent = credentials.username;
            document.getElementById('currencyDisplay').textContent = credentials.currency;
            document.getElementById('avatarLetter').textContent = credentials.username.charAt(0).toUpperCase();

            await loadTranslations();
            setDefaultDates();
            initInstrumentSearch();
            await loadStaticData();

            // Pull to refresh
            setupPullToRefresh();
        }

        // ── PULL TO REFRESH ──
        let _pullStartY = 0;
        let _isPulling = false;

        function setupPullToRefresh() {
            const container = document.getElementById('cardList');
            let touchStartY = 0;

            document.addEventListener('touchstart', (e) => {
                if (window.scrollY === 0) {
                    touchStartY = e.touches[0].clientY;
                }
            }, { passive: true });

            document.addEventListener('touchmove', (e) => {
                const pullY = e.touches[0].clientY - touchStartY;
                const indicator = document.getElementById('pullIndicator');
                if (pullY > 60 && window.scrollY === 0) {
                    indicator.style.display = 'block';
                    indicator.textContent = '⬇ Rilascia per aggiornare';
                    _isPulling = true;
                } else if (_isPulling) {
                    indicator.style.display = 'block';
                    indicator.textContent = '⬇ Tira per aggiornare';
                }
            }, { passive: true });

            document.addEventListener('touchend', (e) => {
                const indicator = document.getElementById('pullIndicator');
                if (_isPulling && window.scrollY === 0) {
                    indicator.textContent = '🔄 Aggiornamento...';
                    fetchMarketData();
                    setTimeout(() => {
                        indicator.style.display = 'none';
                        _isPulling = false;
                    }, 1000);
                } else {
                    indicator.style.display = 'none';
                    _isPulling = false;
                }
            }, { passive: true });
        }

        // ── DATES ─────────────────────────────────────────────────────
        function setDefaultDates() {
            const today = new Date();
            const lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, today.getDate());
            document.getElementById('date-start').value = lastMonth.toISOString().split('T')[0];
            document.getElementById('date-end').value = today.toISOString().split('T')[0];
            document.getElementById('value-min').value = 4;
            document.getElementById('value-max').value = 9999;
        }

        // ── FILTER TOGGLE ─────────────────────────────────────────────
        function toggleFilters() {
            const btn = document.getElementById('filterToggleBtn');
            const body = document.getElementById('filterBody');
            btn.classList.toggle('open');
            body.classList.toggle('open');
        }

        // ── SECTOR DROPDOWN ───────────────────────────────────────────
        function toggleSectorDropdown() {
            const container = document.getElementById('sector-filter-container');
            container.classList.toggle('visible');
            if (container.classList.contains('visible')) {
                const closeHandler = (e) => {
                    if (!container.contains(e.target)) {
                        container.classList.remove('visible');
                        document.removeEventListener('click', closeHandler);
                    }
                };
                setTimeout(() => document.addEventListener('click', closeHandler), 10);
            }
        }

        function updateSectorAnchorText() {
            const anchor = document.getElementById('sectorSelectorAnchor').querySelector('span:first-child');
            if (_selectedSectors.length === 0) {
                anchor.textContent = 'Tutti i settori';
            } else if (_selectedSectors.length === 1) {
                anchor.textContent = getSectorLabel(_selectedSectors[0]);
            } else {
                anchor.textContent = `${_selectedSectors.length} settori`;
            }
            updateFilterBadge();
        }

        function onSectorChange() {
            const cbs = document.getElementById('sectorSelectorItems').querySelectorAll('input[type="checkbox"]');
            _selectedSectors = [];
            cbs.forEach(cb => { if (cb.checked) _selectedSectors.push(cb.value); });
            updateSectorAnchorText();
            if (_lastData.length > 0) applyFiltersAndRender();
        }

        function getSectorLabel(sector) {
            const translated = getTranslation('dom.sector:' + sector);
            return translated && translated !== ('dom.sector:' + sector) ? translated : sector;
        }

        function populateSectorSelector(data) {
            const container = document.getElementById('sectorSelectorItems');
            const sectors = [...new Set(data.map(r => r.sector).filter(Boolean))].sort();
            const prev = [..._selectedSectors];
            container.innerHTML = '';
            sectors.forEach(sector => {
                const label = document.createElement('label');
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = sector;
                cb.checked = prev.includes(sector);
                cb.onchange = onSectorChange;
                label.appendChild(cb);
                const text = document.createTextNode(' ' + getSectorLabel(sector));
                label.appendChild(text);
                container.appendChild(label);
            });
            _selectedSectors = _selectedSectors.filter(s => sectors.includes(s));
            updateSectorAnchorText();
        }

        // ── FILTER BADGE ──
        function updateFilterBadge() {
            const badge = document.getElementById('filterBadge');
            let count = 0;
            if (_selectedSectors.length > 0) count++;
            if (document.getElementById('instrument-filter').value) count++;
            if (document.getElementById('inversion-filter').checked) count++;
            const vMin = document.getElementById('value-min').value;
            const vMax = document.getElementById('value-max').value;
            if (vMin && parseFloat(vMin) > 4) count++;
            if (vMax && parseFloat(vMax) < 9999) count++;

            _filterCount = count;
            if (count > 0) {
                badge.textContent = count;
                badge.style.display = 'inline';
            } else {
                badge.style.display = 'none';
            }
        }

        // ── INSTRUMENT SEARCH ──
        let _instrumentIndex = [];
        let _instSelIdx = -1;
        let _instFiltered = [];

        function initInstrumentSearch() {
            const searchInput = document.getElementById('instrument-search-input');
            const clearBtn = document.getElementById('instrument-search-clear');
            const dropdown = document.getElementById('instrument-search-dropdown');
            const hidden = document.getElementById('instrument-filter');

            searchInput.addEventListener('input', () => {
                const q = searchInput.value.trim();
                clearBtn.style.display = q ? 'block' : 'none';
                renderInstDropdown(q);
                updateFilterBadge();
            });

            searchInput.addEventListener('focus', () => {
                renderInstDropdown(searchInput.value.trim());
            });

            searchInput.addEventListener('keydown', (e) => {
                if (dropdown.style.display === 'none') return;
                if (e.key === 'ArrowDown') { e.preventDefault(); moveInstSel(1); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); moveInstSel(-1); }
                else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (_instSelIdx >= 0 && _instFiltered[_instSelIdx]) {
                        selectInstrument(_instFiltered[_instSelIdx]);
                    }
                }
                else if (e.key === 'Escape') closeInstDropdown();
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                hidden.value = '';
                clearBtn.style.display = 'none';
                closeInstDropdown();
                updateFilterBadge();
                applyFiltersAndRender();
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.instrument-search-wrapper')) closeInstDropdown();
            });
        }

        function populateInstrumentSelector(data) {
            const current = document.getElementById('instrument-filter').value;
            const seen = new Set();
            _instrumentIndex = [];
            data.forEach(r => {
                if (r.id_instrument && !seen.has(r.id_instrument)) {
                    seen.add(r.id_instrument);
                    _instrumentIndex.push({
                        id: r.id_instrument,
                        description: r.instrument_description || '',
                        sector: r.sector || ''
                    });
                }
            });
            _instrumentIndex.sort((a, b) => a.id.localeCompare(b.id));

            if (current && _instrumentIndex.find(i => i.id === current)) {
                const inst = _instrumentIndex.find(i => i.id === current);
                document.getElementById('instrument-search-input').value = inst.description
                    ? `${inst.id} — ${inst.description}` : inst.id;
            }
        }

        function renderInstDropdown(query) {
            const dropdown = document.getElementById('instrument-search-dropdown');
            const q = query.toLowerCase();
            _instFiltered = q
                ? _instrumentIndex.filter(i =>
                    i.id.toLowerCase().includes(q) ||
                    i.description.toLowerCase().includes(q) ||
                    i.sector.toLowerCase().includes(q)
                )
                : _instrumentIndex;
            _instFiltered = _instFiltered.slice(0, 60);
            _instSelIdx = -1;

            if (_instFiltered.length === 0) {
                dropdown.innerHTML = `<div class="inst-item-empty">Nessun risultato</div>`;
            } else {
                dropdown.innerHTML = [
                    `<div class="inst-item" data-idx="-1">
                        <div class="inst-item-main">
                            <span class="inst-item-id">—</span>
                            <span class="inst-item-desc">Tutti gli strumenti</span>
                        </div>
                     </div>`
                ].concat(_instFiltered.map((inst, i) => {
                    const sector = inst.sector
                        ? `<span class="inst-badge inst-badge-sector">${getSectorLabel(inst.sector)}</span>` : '';
                    return `
                        <div class="inst-item" data-idx="${i}">
                            <div class="inst-item-main">
                                <span class="inst-item-id">${inst.id}</span>
                                <span class="inst-item-desc">${inst.description}</span>
                            </div>
                        </div>`;
                })).join('');

                dropdown.querySelectorAll('.inst-item').forEach(el => {
                    el.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        const idx = parseInt(el.dataset.idx);
                        if (idx === -1) clearInstrumentSelection();
                        else selectInstrument(_instFiltered[idx]);
                    });
                });
            }

            dropdown.style.display = 'block';
        }

        function moveInstSel(dir) {
            const dropdown = document.getElementById('instrument-search-dropdown');
            const items = dropdown.querySelectorAll('.inst-item');
            if (!items.length) return;
            _instSelIdx = Math.max(-1, Math.min(_instFiltered.length - 1, _instSelIdx + dir));
            items.forEach((el, i) => el.classList.toggle('active', i - 1 === _instSelIdx));
            const activeEl = dropdown.querySelector('.inst-item.active');
            if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
        }

        function selectInstrument(inst) {
            const searchInput = document.getElementById('instrument-search-input');
            const hidden = document.getElementById('instrument-filter');
            const clearBtn = document.getElementById('instrument-search-clear');
            searchInput.value = inst.description ? `${inst.id} — ${inst.description}` : inst.id;
            hidden.value = inst.id;
            clearBtn.style.display = 'block';
            closeInstDropdown();
            updateFilterBadge();
            applyFiltersAndRender();
        }

        function clearInstrumentSelection() {
            const searchInput = document.getElementById('instrument-search-input');
            const hidden = document.getElementById('instrument-filter');
            const clearBtn = document.getElementById('instrument-search-clear');
            searchInput.value = '';
            hidden.value = '';
            clearBtn.style.display = 'none';
            closeInstDropdown();
            updateFilterBadge();
            applyFiltersAndRender();
        }

        function closeInstDropdown() {
            document.getElementById('instrument-search-dropdown').style.display = 'none';
            _instSelIdx = -1;
        }

        // ── FETCH ─────────────────────────────────────────────────────
        async function fetchMarketData() {
            const date_start = document.getElementById('date-start').value;
            const date_end = document.getElementById('date-end').value;
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'none';

            // Show loading state
            const cardList = document.getElementById('cardList');
            cardList.innerHTML = `
                <div class="loading-text">
                    <div class="spinner"></div>
                    Caricamento dati...
                </div>
            `;

            try {
                const h = await fetch(`${API_URL_MARKET}/health`);
                await h.json();
            } catch (e) { console.warn("Health check skipped:", e); }

            const payload = {
                username: credentials.username,
                token: credentials.token,
                currency: credentials.currency,
                date_start,
                date_end,
                sector: _selectedSectors.length > 0 ? _selectedSectors : null
            };

            try {
                const resp = await fetch(`${API_URL_MARKET}/getmarket`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await resp.json();
                if (result.status === 'ok') {
                    if (result.date_creation) {
                        const dateEl = document.getElementById('dateCreationDisplay');
                        dateEl.textContent = '📅 ' + result.date_creation;
                        dateEl.style.display = 'inline';
                    }
                    renderCards(result.data);
                } else {
                    showMessage(result.msg || 'Errore API', 'error');
                    cardList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>Errore</h3>
                            <p>${result.msg || 'Errore durante il caricamento'}</p>
                        </div>
                    `;
                }
            } catch (err) {
                console.error("Fetch error:", err);
                showMessage('Impossibile raggiungere il server. Verifica la connessione.', 'error');
                cardList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-wifi-slash"></i>
                        <h3>Connessione assente</h3>
                        <p>Verifica la connessione di rete e riprova</p>
                    </div>
                `;
            }
        }

        // ── LOAD STATIC DATA ──────────────────────────────────────────
        async function loadStaticData() {
            try {
                const resp = await fetch('statistics.json.gz?_=' + Date.now());
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const ds = new DecompressionStream('gzip');
                const decompressed = resp.body.pipeThrough(ds);
                const text = await new Response(decompressed).text();
                const result = JSON.parse(text);
                if (result.status === 'ok') {
                    if (result.date_creation) {
                        const dateEl = document.getElementById('dateCreationDisplay');
                        dateEl.textContent = '📅 ' + result.date_creation;
                        dateEl.style.display = 'inline';
                    }
                    renderCards(result.data);
                } else {
                    showMessage('statistics.json.gz non valido: ' + (result.msg || ''), 'warning');
                }
            } catch (err) {
                console.warn('statistics.json.gz non disponibile:', err);
                showMessage('Usa "Applica" per caricare i dati dal server.', 'info');
                const cardList = document.getElementById('cardList');
                cardList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <h3>Nessun dato locale</h3>
                        <p>Premi "Applica" per caricare i dati dal server</p>
                    </div>
                `;
            }
        }

        // ── RENDER ────────────────────────────────────────────────────
        function renderCards(data) {
            _lastData = data;
            populateInstrumentSelector(data);
            const items = document.getElementById('sectorSelectorItems');
            if (items.children.length === 0 || _selectedSectors.length === 0) {
                populateSectorSelector(data);
            }
            applyFiltersAndRender();
        }

        function applyFiltersAndRender() {
            const data = _lastData;
            const vMin = parseFloat(document.getElementById('value-min').value);
            const vMax = parseFloat(document.getElementById('value-max').value);
            const instrFilter = document.getElementById('instrument-filter').value.trim().toLowerCase();
            const invFilter = document.getElementById('inversion-filter').checked;

            const filtered = data.filter(row => {
                const val = parseFloat(row.forza);
                if (isNaN(val)) return false;
                const abs = Math.abs(val);
                if (!isNaN(vMin) && abs < vMin) return false;
                if (!isNaN(vMax) && abs > vMax) return false;
                if (instrFilter && (row.id_instrument || '').toLowerCase() !== instrFilter) return false;
                if (_selectedSectors.length > 0 && !_selectedSectors.includes(row.sector)) return false;
                if (invFilter) {
                    const iVal = parseInt(row.invariance_days) || 0;
                    if (val >= 0 || iVal >= 0) return false;
                }
                return true;
            });

            const cardList = document.getElementById('cardList');
            const resultsHdr = document.getElementById('resultsHeader');

            updateFilterBadge();

            if (filtered.length === 0) {
                cardList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>Nessun risultato</h3>
                        <p>Prova a modificare i filtri</p>
                    </div>
                `;
                resultsHdr.style.display = 'none';
                return;
            }

            resultsHdr.style.display = 'flex';
            document.getElementById('resultsCount').textContent = filtered.length;

            if (_currentView === 'cards') {
                renderCardsView(filtered, cardList);
            } else {
                renderListView(filtered, cardList);
            }
        }

        function renderCardsView(filtered, cardList) {
            cardList.innerHTML = '';
            filtered.forEach(row => {
                const forzaVal = parseFloat(row.forza);
                const isNegForza = forzaVal < 0;
                const isPosForza = forzaVal > 0;

                const invVal = parseInt(row.invariance_days) || 0;
                const isNegInv = invVal < 0;

                const fmtNum = (v, dec = 2) => {
                    if (v === null || v === undefined || v === 'None') return '—';
                    const n = parseFloat(v);
                    return isNaN(n) ? '—' : n.toLocaleString('it-IT', { minimumFractionDigits: dec, maximumFractionDigits: dec });
                };
                const fmtCap = (v) => v ? String(v) : '—';

                const hasFund = row.PE != null || row.EPS != null || row.market_capitalization != null;

                const card = document.createElement('div');
                card.className = 'stat-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="left">
                            <span class="card-id" onclick="openPriceGraph('${row.id_instrument}')">${row.id_instrument}</span>
                            <span class="card-desc" onclick="openInstrumentDetail('${row.id_instrument}')">${row.instrument_description || '—'}</span>
                        </div>
                        <span class="card-date">${row.date_start || ''}</span>
                    </div>
                    <div class="card-badges">
                        <span class="badge badge-sector">${row.sector ? getSectorLabel(row.sector) : '—'}</span>
                        <span class="badge badge-market">${row.code_market || '—'}</span>
                        <span class="badge badge-currency">${row.currency || '—'}</span>
                    </div>
                    <div class="metrics-grid">
                        <div class="metric-item">
                            <span class="label">Forza</span>
                            <span class="value ${isNegForza ? 'negative' : isPosForza ? 'positive' : ''}">${forzaVal}</span>
                        </div>
                        <div class="metric-item">
                            <span class="label">Inv. Days</span>
                            <span class="value ${isNegInv ? 'negative' : ''}">${invVal}</span>
                        </div>
                        <div class="metric-item">
                            <span class="label">Close</span>
                            <span class="value">${fmtNum(row['price@close'])}</span>
                        </div>
                        <div class="metric-item">
                            <span class="label">Volume</span>
                            <span class="value">${fmtNum(row['instrument@volume'], 0)}</span>
                        </div>
                    </div>
                    ${hasFund ? `
                    <div class="fundamentals">
                        ${row.PE != null ? `<div class="fund-item"><span class="label">P/E</span><span class="value">${fmtNum(row.PE)}</span></div>` : ''}
                        ${row.EPS != null ? `<div class="fund-item"><span class="label">EPS</span><span class="value">${fmtNum(row.EPS)}</span></div>` : ''}
                        ${row.market_capitalization ? `<div class="fund-item"><span class="label">Cap</span><span class="value">${fmtCap(row.market_capitalization)}</span></div>` : ''}
                    </div>` : ''}
                `;
                cardList.appendChild(card);
            });
        }

        function renderListView(filtered, cardList) {
            cardList.innerHTML = '';
            const table = document.createElement('table');
            table.style.cssText = `
                width: 100%;
                border-collapse: collapse;
                font-size: 0.7rem;
                background: var(--white);
                border-radius: var(--radius);
                overflow: hidden;
                box-shadow: var(--shadow);
            `;

            const thead = document.createElement('thead');
            thead.innerHTML = `
                <tr style="background: var(--bg); border-bottom: 2px solid var(--border);">
                    <th style="padding: 10px 12px; text-align:left; font-weight:700; color: var(--text-secondary); font-size:0.6rem; text-transform:uppercase; letter-spacing:0.5px;">Strumento</th>
                    <th style="padding: 10px 12px; text-align:right; font-weight:700; color: var(--text-secondary); font-size:0.6rem; text-transform:uppercase; letter-spacing:0.5px;">Forza</th>
                    <th style="padding: 10px 12px; text-align:right; font-weight:700; color: var(--text-secondary); font-size:0.6rem; text-transform:uppercase; letter-spacing:0.5px;">Inv.</th>
                    <th style="padding: 10px 12px; text-align:right; font-weight:700; color: var(--text-secondary); font-size:0.6rem; text-transform:uppercase; letter-spacing:0.5px;">Close</th>
                </tr>
            `;
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            filtered.forEach(row => {
                const forzaVal = parseFloat(row.forza);
                const isNegForza = forzaVal < 0;
                const invVal = parseInt(row.invariance_days) || 0;
                const isNegInv = invVal < 0;
                const tr = document.createElement('tr');
                tr.style.cssText = 'border-bottom: 1px solid var(--border); cursor:pointer;';
                tr.onclick = () => openInstrumentDetail(row.id_instrument);
                tr.innerHTML = `
                    <td style="padding: 10px 12px;">
                        <div style="display:flex; flex-direction:column; gap:1px;">
                            <span style="font-weight:700; color: var(--text);">${row.id_instrument}</span>
                            <span style="font-size:0.6rem; color: var(--text-secondary);">${row.instrument_description || ''}</span>
                        </div>
                    </td>
                    <td style="padding: 10px 12px; text-align:right; font-weight:700; color: ${isNegForza ? 'var(--red)' : 'var(--green)'};">${forzaVal}</td>
                    <td style="padding: 10px 12px; text-align:right; font-weight:700; color: ${isNegInv ? 'var(--red)' : ''};">${invVal}</td>
                    <td style="padding: 10px 12px; text-align:right; font-weight:600;">${parseFloat(row['price@close']).toFixed(2)}</td>
                `;
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            cardList.appendChild(table);
        }

        // ── VIEW SWITCH ──
        function setView(view) {
            _currentView = view;
            document.getElementById('viewCards').classList.toggle('active', view === 'cards');
            document.getElementById('viewList').classList.toggle('active', view === 'list');
            if (_lastData.length > 0) applyFiltersAndRender();
        }

        // ── HELPERS ───────────────────────────────────────────────────
        function showMessage(text, type) {
            const d = document.getElementById('message');
            d.textContent = text;
            d.className = `message ${type}`;
            d.style.display = 'block';
            // Auto-hide after 5 seconds
            setTimeout(() => {
                d.style.display = 'none';
            }, 5000);
        }

        function closeDashboard() { window.close(); }

        function openPriceGraph(id) {
            const url = `dashboard-graph-prices.html?id_instrument=${id}&username=${credentials.username}&token=${credentials.token}&instrument_currency=${credentials.currency}`;
            window.open(url, '_blank');
        }

        function openInstrumentDetail(id) {
            const url = `dashboard-detail-instrument.html?id_instrument=${id}&username=${credentials.username}&token=${credentials.token}&language=${credentials.language}&currency=${credentials.currency}`;
            window.open(url, '_blank');
        }

        // ── INPUT LISTENERS FOR FILTER BADGE ──
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('value-min').addEventListener('input', updateFilterBadge);
            document.getElementById('value-max').addEventListener('input', updateFilterBadge);
            document.getElementById('inversion-filter').addEventListener('change', updateFilterBadge);
            document.getElementById('instrument-filter').addEventListener('change', updateFilterBadge);
            // Filter badge initial update
            setTimeout(updateFilterBadge, 100);
        });

        window.onload = init;
    </script>
</body>

</html>
