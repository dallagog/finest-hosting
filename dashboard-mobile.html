<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Statistics – Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="js/dashboard-shared.js"></script>
    <link rel="icon" type="image/png" href="images/icon-finest.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap');

        :root {
            --bg: #f2f2ee;
            --white: #ffffff;
            --border: #cccccc;
            --text: #222222;
            --muted: #666666;
            --red: #cc0000;
            --accent: #000000;
            --card-radius: 10px;
            --header-h: 56px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 24px;
        }

        /* ── TOP HEADER ── */
        .top-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--white);
            border-bottom: 2px solid var(--accent);
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,.12);
        }

        .top-header h1 {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            flex: 1;
            text-align: center;
        }

        .top-header .user-badge {
            font-size: 0.65rem;
            color: var(--muted);
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 60px;
        }

        .top-header .user-badge strong { color: var(--text); }

        .close-btn {
            background: rgba(204,0,0,.12);
            border: 1px solid var(--red);
            color: var(--red);
            border-radius: 6px;
            padding: 6px 12px;
            font-family: inherit;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            min-width: 60px;
            text-align: center;
            transition: background .2s;
        }
        .close-btn:active { background: rgba(204,0,0,.3); }

        /* ── MESSAGE ── */
        .message {
            margin: 12px 14px 0;
            padding: 12px;
            border-radius: var(--card-radius);
            border-left: 4px solid;
            font-size: 0.75rem;
            display: none;
        }
        .message.error   { background:#fee; color:#c00; border-color:#c00; display:block; }
        .message.warning { background:#fff3cd; color:#856404; border-color:#ffc107; display:block; }

        /* ── FILTER PANEL ── */
        .filter-panel {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            margin: 12px 14px 0;
            overflow: hidden;
        }

        .filter-toggle {
            width: 100%;
            background: none;
            border: none;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: .5px;
            cursor: pointer;
            color: var(--text);
        }
        .filter-toggle .arrow { transition: transform .25s; font-size: 0.7rem; }
        .filter-toggle.open .arrow { transform: rotate(180deg); }

        .filter-body {
            display: none;
            padding: 0 16px 16px;
            flex-direction: column;
            gap: 12px;
        }
        .filter-body.open { display: flex; }

        .filter-group { display: flex; flex-direction: column; gap: 5px; }

        .filter-group label {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: .3px;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.8rem;
            background: var(--white);
            color: var(--text);
            -webkit-appearance: none;
            appearance: none;
        }

        /* date row */
        .date-row { display: flex; gap: 10px; }
        .date-row .filter-group { flex: 1; }

        /* force row */
        .force-row { display: flex; gap: 10px; }
        .force-row .filter-group { flex: 1; }

        /* inversion checkbox */
        .inversion-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 0;
        }
        .inversion-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .inversion-row label {
            font-size: 0.8rem;
            color: var(--text);
            cursor: pointer;
        }

        /* Sector multi-select */
        .dropdown-check-list { position: relative; width: 100%; }
        .dropdown-check-list .anchor {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--white);
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .dropdown-check-list .anchor::after {
            content: '▾';
            font-size: 0.75rem;
            color: var(--muted);
        }
        .dropdown-check-list .items {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            z-index: 200;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 6px;
            box-shadow: 0 6px 16px rgba(0,0,0,.15);
            max-height: 240px;
            overflow-y: auto;
            padding: 6px;
        }
        .dropdown-check-list.visible .items { display: block; }
        .dropdown-check-list .items label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 6px;
            font-size: 0.78rem;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text);
        }
        .dropdown-check-list .items label:hover { background: #f0f0f0; }
        .dropdown-check-list input[type="checkbox"] { width: 16px; height: 16px; margin: 0; }

        /* Apply button */
        .apply-btn {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: .5px;
            cursor: pointer;
            transition: opacity .2s;
        }
        .apply-btn:active { opacity: .75; }

        /* ── RESULTS HEADER ── */
        .results-header {
            margin: 14px 14px 0;
            font-size: 0.72rem;
            color: var(--muted);
        }
        .results-header strong { color: var(--text); }

        /* ── CARD LIST ── */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 10px 14px 0;
        }

        .stat-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
            cursor: pointer;
            transition: box-shadow .2s;
        }
        .stat-card:active { box-shadow: 0 3px 10px rgba(0,0,0,.15); }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }

        .card-id {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: .5px;
            color: var(--accent);
            text-decoration: underline;
            cursor: pointer;
        }

        .card-date {
            font-size: 0.65rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .card-desc {
            font-size: 0.72rem;
            color: var(--muted);
            line-height: 1.4;
        }

        .card-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #eee;
            padding-top: 8px;
            gap: 8px;
        }

        .card-sector {
            font-size: 0.65rem;
            color: var(--muted);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-metrics {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .metric {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
        }

        .metric-label {
            font-size: 0.58rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        .metric-value {
            font-size: 0.82rem;
            font-weight: 700;
        }

        .metric-value.negative { color: var(--red); }

        .metric-sub {
            font-size: 0.6rem;
            font-weight: normal;
            color: var(--muted);
        }

        /* loading placeholder */
        .loading-text {
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
            padding: 40px 0;
        }

        /* fundamentals row */
        .card-fundamentals {
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
            padding-top: 8px;
            justify-content: flex-end;
        }

        .fund-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
        }

        .fund-label {
            font-size: 0.56rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        .fund-value {
            font-size: 0.76rem;
            font-weight: 700;
            color: var(--text);
        }

        /* ── INSTRUMENT SEARCH WIDGET ── */
        .instrument-search-wrapper {
            position: relative;
            width: 100%;
        }

        .instrument-search-field {
            width: 100%;
            padding: 10px 36px 10px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.8rem;
            background: var(--white);
            color: var(--text);
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .instrument-search-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0,0,0,0.08);
        }

        .instrument-search-clear {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--muted);
            font-size: 14px;
            display: none;
            background: none;
            border: none;
            padding: 2px 4px;
            line-height: 1;
            transition: color 0.2s;
        }

        .instrument-search-clear:hover { color: var(--text); }

        .instrument-search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--white);
            border: 1px solid var(--accent);
            border-top: none;
            z-index: 300;
            max-height: 280px;
            overflow-y: auto;
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
            border-radius: 0 0 6px 6px;
            display: none;
        }

        .inst-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            gap: 3px;
            transition: background 0.15s;
        }

        .inst-item:last-child { border-bottom: none; }
        .inst-item:hover, .inst-item.active { background: #f5f5f5; }

        .inst-item-main {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .inst-item-id {
            font-weight: 700;
            color: var(--accent);
            font-size: 0.82em;
            min-width: 60px;
            letter-spacing: 0.5px;
        }

        .inst-item-desc {
            font-size: 0.78em;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .inst-item-meta { display: flex; gap: 5px; flex-wrap: wrap; }

        .inst-badge {
            font-size: 0.65em;
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .inst-badge-sector { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }

        .inst-item-empty {
            padding: 10px 12px;
            color: var(--muted);
            font-style: italic;
            font-size: 0.82em;
        }
    </style>
</head>

<body>

    <!-- TOP HEADER -->
    <header class="top-header">
        <div class="user-badge">
            <span><strong id="usernameDisplay">-</strong></span>
            <span id="currencyDisplay">-</span>
            <span id="dateCreationDisplay" style="font-size: 0.55rem; display: none;"></span>
        </div>
        <h1>Statistics</h1>
        <button class="close-btn" onclick="closeDashboard()">Chiudi</button>
    </header>

    <div id="message" class="message"></div>

    <!-- FILTER PANEL -->
    <div class="filter-panel">
        <button class="filter-toggle" id="filterToggleBtn" onclick="toggleFilters()">
            <span><i class="fa fa-sliders-h" style="margin-right:8px;"></i>Filtri</span>
            <span class="arrow">▾</span>
        </button>
        <div class="filter-body open" id="filterBody">

            <div class="date-row">
                <div class="filter-group">
                    <label>Data iniziale</label>
                    <input type="date" id="date-start">
                </div>
                <div class="filter-group">
                    <label>Data finale</label>
                    <input type="date" id="date-end">
                </div>
            </div>

            <div class="force-row">
                <div class="filter-group">
                    <label>Forza min</label>
                    <input type="number" id="value-min" step="0.01">
                </div>
                <div class="filter-group">
                    <label>Forza max</label>
                    <input type="number" id="value-max" step="0.01">
                </div>
            </div>

            <div class="filter-group">
                <label>Settore</label>
                <div id="sector-filter-container" class="dropdown-check-list">
                    <span class="anchor" onclick="toggleSectorDropdown()" id="sectorSelectorAnchor">Tutti i settori</span>
                    <div id="sectorSelectorItems" class="items"></div>
                </div>
            </div>

            <div class="filter-group">
                <label>Strumento</label>
                <div class="instrument-search-wrapper">
                    <input type="text"
                           id="instrument-search-input"
                           class="instrument-search-field"
                           placeholder="Cerca per codice o nome..."
                           autocomplete="off">
                    <button type="button" class="instrument-search-clear" id="instrument-search-clear" title="Cancella">&#x2715;</button>
                    <div class="instrument-search-dropdown" id="instrument-search-dropdown"></div>
                </div>
                <input type="hidden" id="instrument-filter" value="">
            </div>

            <div class="inversion-row">
                <input type="checkbox" id="inversion-filter">
                <label id="inversion-label" for="inversion-filter" data-translate="int.inversion">Inversione</label>
            </div>

            <button class="apply-btn" onclick="fetchMarketData()" data-translate="int.apply">Applica selezione</button>
        </div>
    </div>

    <!-- RESULTS -->
    <div class="results-header" id="results-header" style="display:none;">
        Record trovati: <strong id="results-count">0</strong>
    </div>

    <div class="card-list" id="card-list">
        <p class="loading-text">In attesa di caricamento…</p>
    </div>

    <script>
        const API_URL_MARKET = "https://market-tunnel.fe-web.eu";

        const credentials = {
            username: localStorage.getItem('username'),
            token: localStorage.getItem('token'),
            currency: localStorage.getItem('currency') || 'EUR',
            date_start: localStorage.getItem('date_start') || '',
            date_end: localStorage.getItem('date_end') || '',
            language: localStorage.getItem('language') || 'it_IT'
        };

        let translations = {};
        let _lastData = [];
        let _selectedSectors = [];

        // ── TRANSLATIONS ──────────────────────────────────────────────
        async function loadTranslations() {
            try {
                const resp = await fetch(`lang/${credentials.language}.json`);
                if (resp.ok) {
                    translations = await resp.json();
                    applyTranslations();
                }
            } catch (err) { console.error("Translations error:", err); }
        }

        function getTranslation(key) { return translations[key] || key; }

        function applyTranslations() {
            document.querySelectorAll('[data-translate]').forEach(el => {
                el.textContent = getTranslation(el.getAttribute('data-translate'));
            });
        }

        // ── INIT ──────────────────────────────────────────────────────
        async function init() {
            if (!credentials.username) {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('usernameDisplay').textContent = credentials.username;
            document.getElementById('currencyDisplay').textContent = credentials.currency;

            await loadTranslations();
            setDefaultDates();
            initInstrumentSearch();
            await loadStaticData();
        }

        async function loadStaticData() {
            try {
                const resp = await fetch('statistics.json?_=' + Date.now());
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const result = await resp.json();
                if (result.status === 'ok') {
                    if (result.date_creation) {
                        const dateEl = document.getElementById('dateCreationDisplay');
                        dateEl.textContent = result.date_creation;
                        dateEl.style.display = 'inline';
                    }
                    renderCards(result.data);
                } else {
                    showMessage('statistics.json non valido: ' + (result.msg || ''), 'warning');
                }
            } catch (err) {
                console.warn('statistics.json non disponibile:', err);
                showMessage('Dati locali non disponibili. Usare "Applica selezione" per caricare i dati dal server.', 'warning');
            }
        }

        // ── DATES ─────────────────────────────────────────────────────
        function setDefaultDates() {
            const today = new Date();
            const lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, today.getDate());
            document.getElementById('date-start').value = lastMonth.toISOString().split('T')[0];
            document.getElementById('date-end').value = today.toISOString().split('T')[0];
            document.getElementById('value-min').value = 4;
            document.getElementById('value-max').value = 9999;
        }

        // ── FILTER TOGGLE ─────────────────────────────────────────────
        function toggleFilters() {
            const btn = document.getElementById('filterToggleBtn');
            const body = document.getElementById('filterBody');
            btn.classList.toggle('open');
            body.classList.toggle('open');
        }

        // ── SECTOR DROPDOWN ───────────────────────────────────────────
        function toggleSectorDropdown() {
            const container = document.getElementById('sector-filter-container');
            container.classList.toggle('visible');
            if (container.classList.contains('visible')) {
                const closeHandler = (e) => {
                    if (!container.contains(e.target)) {
                        container.classList.remove('visible');
                        document.removeEventListener('click', closeHandler);
                    }
                };
                setTimeout(() => document.addEventListener('click', closeHandler), 10);
            }
        }

        function updateSectorAnchorText() {
            const anchor = document.getElementById('sectorSelectorAnchor');
            if (_selectedSectors.length === 0) anchor.textContent = 'Tutti i settori';
            else if (_selectedSectors.length === 1) anchor.textContent = _selectedSectors[0];
            else anchor.textContent = `${_selectedSectors.length} selezionati`;
        }

        function onSectorChange() {
            const cbs = document.getElementById('sectorSelectorItems').querySelectorAll('input[type="checkbox"]');
            _selectedSectors = [];
            cbs.forEach(cb => { if (cb.checked) _selectedSectors.push(cb.value); });
            updateSectorAnchorText();
            if (_lastData.length > 0) applyFiltersAndRender();
        }

        function getSectorLabel(sector) {
            const translated = getTranslation('dom.sector:' + sector);
            return (translated && translated !== 'dom.sector:' + sector)
                ? `${sector} – ${translated}`
                : sector;
        }

        function populateSectorSelector(data) {
            const container = document.getElementById('sectorSelectorItems');
            const sectors = [...new Set(data.map(r => r.sector).filter(Boolean))].sort();
            const prev = [..._selectedSectors];
            container.innerHTML = '';
            sectors.forEach(sector => {
                const label = document.createElement('label');
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = sector;
                cb.checked = prev.includes(sector);
                cb.onchange = onSectorChange;
                label.appendChild(cb);
                label.appendChild(document.createTextNode(' ' + getSectorLabel(sector)));
                container.appendChild(label);
            });
            _selectedSectors = _selectedSectors.filter(s => sectors.includes(s));
            updateSectorAnchorText();
        }

        /* ---- Instrument Search Widget ---- */
        let _instrumentIndex = [];
        let _instSelIdx = -1;
        let _instFiltered = [];

        function initInstrumentSearch() {
            const searchInput = document.getElementById('instrument-search-input');
            const clearBtn    = document.getElementById('instrument-search-clear');
            const dropdown    = document.getElementById('instrument-search-dropdown');
            const hidden      = document.getElementById('instrument-filter');

            searchInput.addEventListener('input', () => {
                const q = searchInput.value.trim();
                clearBtn.style.display = q ? 'block' : 'none';
                renderInstDropdown(q);
            });

            searchInput.addEventListener('focus', () => {
                renderInstDropdown(searchInput.value.trim());
            });

            searchInput.addEventListener('keydown', (e) => {
                if (dropdown.style.display === 'none') return;
                if (e.key === 'ArrowDown')      { e.preventDefault(); moveInstSel(1); }
                else if (e.key === 'ArrowUp')   { e.preventDefault(); moveInstSel(-1); }
                else if (e.key === 'Enter')     {
                    e.preventDefault();
                    if (_instSelIdx >= 0 && _instFiltered[_instSelIdx]) selectInstrument(_instFiltered[_instSelIdx]);
                }
                else if (e.key === 'Escape')    closeInstDropdown();
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                hidden.value = '';
                clearBtn.style.display = 'none';
                closeInstDropdown();
                applyFiltersAndRender();
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.instrument-search-wrapper')) closeInstDropdown();
            });
        }

        function populateInstrumentSelector(data) {
            const current = document.getElementById('instrument-filter').value;
            const seen = new Set();
            _instrumentIndex = [];
            data.forEach(r => {
                if (r.id_instrument && !seen.has(r.id_instrument)) {
                    seen.add(r.id_instrument);
                    _instrumentIndex.push({
                        id: r.id_instrument,
                        description: r.instrument_description || '',
                        sector: r.sector || ''
                    });
                }
            });
            _instrumentIndex.sort((a, b) => a.id.localeCompare(b.id));

            // Ripristina la label se la selezione è ancora valida
            if (current && _instrumentIndex.find(i => i.id === current)) {
                const inst = _instrumentIndex.find(i => i.id === current);
                document.getElementById('instrument-search-input').value = inst.description
                    ? `${inst.id} — ${inst.description}` : inst.id;
            }
        }

        function renderInstDropdown(query) {
            const dropdown = document.getElementById('instrument-search-dropdown');
            const q = query.toLowerCase();
            _instFiltered = q
                ? _instrumentIndex.filter(i =>
                    i.id.toLowerCase().includes(q) ||
                    i.description.toLowerCase().includes(q) ||
                    i.sector.toLowerCase().includes(q)
                  )
                : _instrumentIndex;
            _instFiltered = _instFiltered.slice(0, 60);
            _instSelIdx = -1;

            if (_instFiltered.length === 0) {
                dropdown.innerHTML = `<div class="inst-item-empty">Nessun risultato</div>`;
            } else {
                dropdown.innerHTML = [
                    `<div class="inst-item" data-idx="-1">
                        <div class="inst-item-main">
                            <span class="inst-item-id">—</span>
                            <span class="inst-item-desc">Tutti gli strumenti</span>
                        </div>
                     </div>`
                ].concat(_instFiltered.map((inst, i) => {
                    const sector = inst.sector
                        ? `<span class="inst-badge inst-badge-sector">${getSectorLabel(inst.sector)}</span>` : '';
                    return `
                        <div class="inst-item" data-idx="${i}">
                            <div class="inst-item-main">
                                <span class="inst-item-id">${inst.id}</span>
                                <span class="inst-item-desc">${inst.description}</span>
                            </div>
                            <div class="inst-item-meta">${sector}</div>
                        </div>`;
                })).join('');

                dropdown.querySelectorAll('.inst-item').forEach(el => {
                    el.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        const idx = parseInt(el.dataset.idx);
                        if (idx === -1) clearInstrumentSelection();
                        else selectInstrument(_instFiltered[idx]);
                    });
                });
            }

            dropdown.style.display = 'block';
        }

        function moveInstSel(dir) {
            const dropdown = document.getElementById('instrument-search-dropdown');
            const items = dropdown.querySelectorAll('.inst-item');
            if (!items.length) return;
            _instSelIdx = Math.max(-1, Math.min(_instFiltered.length - 1, _instSelIdx + dir));
            items.forEach((el, i) => el.classList.toggle('active', i - 1 === _instSelIdx));
            const activeEl = dropdown.querySelector('.inst-item.active');
            if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
        }

        function selectInstrument(inst) {
            const searchInput = document.getElementById('instrument-search-input');
            const hidden      = document.getElementById('instrument-filter');
            const clearBtn    = document.getElementById('instrument-search-clear');
            searchInput.value = inst.description ? `${inst.id} — ${inst.description}` : inst.id;
            hidden.value = inst.id;
            clearBtn.style.display = 'block';
            closeInstDropdown();
            applyFiltersAndRender();
        }

        function clearInstrumentSelection() {
            const searchInput = document.getElementById('instrument-search-input');
            const hidden      = document.getElementById('instrument-filter');
            const clearBtn    = document.getElementById('instrument-search-clear');
            searchInput.value = '';
            hidden.value = '';
            clearBtn.style.display = 'none';
            closeInstDropdown();
            applyFiltersAndRender();
        }

        function closeInstDropdown() {
            document.getElementById('instrument-search-dropdown').style.display = 'none';
            _instSelIdx = -1;
        }

        // ── FETCH ─────────────────────────────────────────────────────
        async function fetchMarketData() {
            const date_start = document.getElementById('date-start').value;
            const date_end = document.getElementById('date-end').value;
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'none';

            // health check (non-blocking)
            try {
                const h = await fetch(`${API_URL_MARKET}/health`);
                await h.json();
            } catch (e) { console.warn("Health check skipped:", e); }

            const payload = {
                username: credentials.username,
                token: credentials.token,
                currency: credentials.currency,
                date_start,
                date_end,
                sector: _selectedSectors.length > 0 ? _selectedSectors : null
            };

            try {
                const resp = await fetch(`${API_URL_MARKET}/getmarket`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await resp.json();
                if (result.status === 'ok') {
                    if (result.date_creation) {
                        const dateEl = document.getElementById('dateCreationDisplay');
                        dateEl.textContent = result.date_creation;
                        dateEl.style.display = 'inline';
                    }
                    renderCards(result.data);
                } else {
                    showMessage(result.msg || 'Errore API', 'error');
                }
            } catch (err) {
                console.error("Fetch error:", err);
                showMessage('Impossibile raggiungere il server market-tunnel. Verificare la connessione o i record DNS.', 'error');
            }
        }

        // ── RENDER ────────────────────────────────────────────────────
        function renderCards(data) {
            _lastData = data;
            populateInstrumentSelector(data);
            const items = document.getElementById('sectorSelectorItems');
            if (items.children.length === 0 || _selectedSectors.length === 0) {
                populateSectorSelector(data);
            }
            applyFiltersAndRender();
        }

        function applyFiltersAndRender() {
            const data = _lastData;
            const vMin = parseFloat(document.getElementById('value-min').value);
            const vMax = parseFloat(document.getElementById('value-max').value);
            const instrFilter = document.getElementById('instrument-filter').value.trim().toLowerCase();
            const invFilter = document.getElementById('inversion-filter').checked;

            const filtered = data.filter(row => {
                const val = parseFloat(row.forza);
                if (isNaN(val)) return false;
                const abs = Math.abs(val);
                if (!isNaN(vMin) && abs < vMin) return false;
                if (!isNaN(vMax) && abs > vMax) return false;
                if (instrFilter && (row.id_instrument || '').toLowerCase() !== instrFilter) return false;
                if (_selectedSectors.length > 0 && !_selectedSectors.includes(row.sector)) return false;
                if (invFilter) {
                    const iVal = parseInt(row.invariance_days) || 0;
                    if (val >= 0 || iVal >= 0) return false;
                }
                return true;
            });

            const cardList = document.getElementById('card-list');
            const resultsHdr = document.getElementById('results-header');

            if (filtered.length === 0) {
                cardList.innerHTML = '<p class="loading-text">Nessun dato corrispondente ai filtri.</p>';
                resultsHdr.style.display = 'none';
                return;
            }

            resultsHdr.style.display = 'block';
            document.getElementById('results-count').textContent = filtered.length;

            cardList.innerHTML = '';
            filtered.forEach(row => {
                const forzaVal = parseFloat(row.forza);
                const isNegForza = forzaVal < 0;

                const invVal = parseInt(row.invariance_days) || 0;
                const isNegInv = invVal < 0;
                let invLabel = '';
                if (invVal < 0) invLabel = getTranslation('int.invariance.negative');
                else if (invVal > 0) invLabel = getTranslation('int.invariance.positive');

                const card = document.createElement('div');
                card.className = 'stat-card';

                const fmtNum = (v, dec = 2) => {
                    const n = parseFloat(v);
                    return isNaN(n) ? '—' : n.toLocaleString('it-IT', { minimumFractionDigits: dec, maximumFractionDigits: dec });
                };
                const fmtCap = (v) => {
                    return v ? String(v) : '—';
                };

                const hasFund = row.PE != null || row.EPS != null || row.market_capitalization != null;

                card.innerHTML = `
                    <div class="card-top">
                        <span class="card-id" onclick="openPriceGraph('${row.id_instrument}')">${row.id_instrument}</span>
                        <span class="card-date">${row.date_start || ''}</span>
                    </div>
                    <div class="card-desc" onclick="openInstrumentDetail('${row.id_instrument}')">${row.instrument_description || '—'}</div>
                    <div class="card-bottom">
                        <span class="card-sector">${row.sector ? getSectorLabel(row.sector) : '—'}</span>
                        <div class="card-metrics">
                            <div class="metric">
                                <span class="metric-label">Forza</span>
                                <span class="metric-value ${isNegForza ? 'negative' : ''}">${forzaVal}</span>
                            </div>
                            <div class="metric">
                                <span class="metric-label">Inv.</span>
                                <span class="metric-value ${isNegInv ? 'negative' : ''}">
                                    ${invVal}
                                    ${invLabel ? `<span class="metric-sub">${invLabel}</span>` : ''}
                                </span>
                            </div>
                        </div>
                    </div>
                    ${hasFund ? `
                    <div class="card-fundamentals">
                        <div class="fund-item">
                            <span class="fund-label">PE</span>
                            <span class="fund-value">${fmtNum(row.PE)}</span>
                        </div>
                        <div class="fund-item">
                            <span class="fund-label">EPS</span>
                            <span class="fund-value">${fmtNum(row.EPS)}</span>
                        </div>
                        <div class="fund-item">
                            <span class="fund-label">Mkt Cap</span>
                            <span class="fund-value">${fmtCap(row.market_capitalization)}</span>
                        </div>
                    </div>` : ''}`;

                cardList.appendChild(card);
            });

            // collapse filter panel after apply on mobile
            const body = document.getElementById('filterBody');
            const btn  = document.getElementById('filterToggleBtn');
            if (body.classList.contains('open')) {
                body.classList.remove('open');
                btn.classList.remove('open');
            }
        }

        // ── HELPERS ───────────────────────────────────────────────────
        function showMessage(text, type) {
            const d = document.getElementById('message');
            d.textContent = text;
            d.className = `message ${type}`;
            d.style.display = 'block';
        }

        function closeDashboard() { window.close(); }

        function openPriceGraph(id) {
            const url = `dashboard-graph-prices.html?id_instrument=${id}&username=${credentials.username}&token=${credentials.token}&instrument_currency=${credentials.currency}`;
            window.open(url, '_blank');
        }

        function openInstrumentDetail(id) {
            const url = `dashboard-detail-instrument.html?id_instrument=${id}&username=${credentials.username}&token=${credentials.token}&language=${credentials.language}&currency=${credentials.currency}`;
            window.open(url, '_blank');
        }

        window.onload = init;
    </script>
</body>

</html>
