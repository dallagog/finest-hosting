<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statistics Graph 0.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="icon" type="image/png" href="images/icon-finest.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap');

        :root {
            --bg-color: #f5f5f0;
            --neon-cyan: #000000;
            --glass-bg: #ffffff;
            --text-color: #333333;
            --border-color: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: var(--bg-color);
            padding: 15px;
            color: var(--text-color);
            min-height: 100vh;
            overflow: hidden;
        }

        .main-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ---- HEADER ---- */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            flex-shrink: 0;
        }

        .user-info-left {
            flex: 1;
            font-size: 12px;
            color: var(--neon-cyan);
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        h1 {
            flex: 1;
            text-align: center;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1em;
        }

        .header-actions {
            flex: 1;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            align-items: center;
        }

        .close-btn {
            padding: 7px 14px;
            background: rgba(255, 0, 0, 0.12);
            border: 1px solid #ff3333;
            color: #ff3333;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 11px;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 0, 0, 0.28);
            box-shadow: 0 0 8px #ff3333;
        }

        .ctrl-btn {
            padding: 7px 14px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 11px;
            transition: all 0.2s;
        }

        .ctrl-btn:hover {
            background: #333;
        }

        .ctrl-btn.active-filter {
            background: #d32f2f;
        }

        .ctrl-btn.active-filter:hover {
            background: #b71c1c;
        }

        .market-select {
            padding: 6px 10px;
            background: #fff;
            color: #000;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 11px;
        }

        /* ---- MESSAGE ---- */
        .message {
            padding: 10px 16px;
            border-radius: 4px;
            display: none;
            border-left: 5px solid;
            font-size: 12px;
            flex-shrink: 0;
        }

        .message.error {
            background: #fee;
            color: #c00;
            border-color: #c00;
            display: block;
        }

        .message.warning {
            background: #fff3cd;
            color: #856404;
            border-color: #ffc107;
            display: block;
        }

        .message.info {
            background: #e8f4fd;
            color: #1565c0;
            border-color: #1565c0;
            display: block;
        }

        /* ---- GRAPH CONTAINER ---- */
        .graph-wrapper {
            flex: 1;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        #timeline-svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #timeline-svg:active {
            cursor: grabbing;
        }

        /* ---- LOADING ---- */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            font-family: 'Orbitron', sans-serif;
            color: #999;
            gap: 12px;
        }

        .loading-overlay i {
            font-size: 2.2em;
            animation: spin 1s linear infinite;
        }

        .loading-sub {
            font-size: 10px;
            color: #bbb;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ---- TOOLTIP ---- */
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.92);
            color: #fff;
            padding: 10px 14px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 200;
            max-width: 260px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
            line-height: 1.7;
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip .tt-id {
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 2px;
        }

        .tooltip .tt-desc {
            color: #bbb;
            font-size: 9px;
            margin-bottom: 5px;
        }

        .tt-pos {
            color: #4caf50;
            font-weight: bold;
        }

        .tt-neg {
            color: #f44336;
            font-weight: bold;
        }

        .tt-badge {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 8px;
            font-weight: 700;
            margin-right: 3px;
        }

        .tt-sector {
            background: #e3f2fd;
            color: #1565c0;
        }

        .tt-market {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .tt-portfolio {
            background: #e8f5e9;
            color: #2e7d32;
        }

        /* ---- LEGEND ---- */
        .legend {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 9px;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.07);
            line-height: 1.9;
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 0.15);
            flex-shrink: 0;
        }

        .legend-cloud {
            width: 24px;
            height: 18px;
            flex-shrink: 0;
            position: relative;
            opacity: 0.85;
        }

        .legend-cloud svg {
            width: 100%;
            height: 100%;
        }

        /* ---- STATS ---- */
        .stats-bar {
            position: absolute;
            top: 12px;
            left: 14px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 6px 12px;
            font-size: 9px;
            color: #666;
            pointer-events: none;
            z-index: 10;
            line-height: 1.8;
        }

        .stats-bar strong {
            color: #000;
        }

        /* ---- MODERN BALL STYLES ---- */
        .node-ball {
            filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.15));
            transition: all 0.2s ease;
        }

        .node-ball:hover {
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.30));
        }

        .node-cloud {
            filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.10));
            transition: all 0.2s ease;
        }

        .node-cloud:hover {
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.25));
        }

        .portfolio-node {
            filter: drop-shadow(0 0 6px rgba(46, 125, 50, 0.5)) !important;
        }
    </style>
</head>

<body>
    <div class="main-container">

        <!-- HEADER -->
        <div class="header-bar">
            <div class="user-info-left">
                <div><strong>Utente:</strong> <span id="usernameDisplay">-</span></div>
                <div><strong>Valuta:</strong> <span id="currencyDisplay">-</span></div>
                <div id="date-creation-container" style="display:none;">
                    <strong>Dati del:</strong> <span id="dateCreationDisplay">-</span>
                </div>
            </div>
            <h1>📊 Statistics Timeline</h1>
            <div class="header-actions">
                <select class="market-select" id="marketSelect" onchange="onMarketChange()">
                    <option value="ALL">Tutti i mercati</option>
                </select>
                <button class="ctrl-btn" id="resetBtn" onclick="resetZoom()">
                    <i class="fas fa-compress-alt"></i> Reset
                </button>
                <button class="ctrl-btn" id="togglePortfolioBtn" onclick="togglePortfolioHighlight()">
                    <i class="fas fa-star"></i> Portfolio
                </button>
                <button class="ctrl-btn" id="intInversionBtn" onclick="toggleIntInversion()">
                    <i class="fas fa-arrow-rotate-left"></i> Int.Inversion
                </button>
                <button class="close-btn" onclick="window.close()">✕ Chiudi</button>
            </div>
        </div>

        <div id="message" class="message"></div>

        <!-- GRAPH AREA -->
        <div class="graph-wrapper" id="graphWrapper">
            <svg id="timeline-svg"></svg>

            <div class="loading-overlay" id="loadingOverlay">
                <i class="fas fa-spinner"></i>
                <div>Caricamento dati...</div>
                <div class="loading-sub" id="loadingStatus">Connessione al server</div>
            </div>

            <div class="stats-bar" id="statsBar" style="display:none;">
                <div>Strumenti: <strong id="statCount">0</strong></div>
                <div>Settori: <strong id="statSectors">0</strong></div>
                <div>Date: <strong id="statDates">0</strong></div>
            </div>

            <div class="legend" id="legend" style="display:none;">
                <div class="legend-row"><span class="legend-dot" style="background:#4caf50;"></span> Forza positiva
                </div>
                <div class="legend-row"><span class="legend-dot" style="background:#f44336;"></span> Forza negativa
                </div>
                <div class="legend-row"><span class="legend-dot"
                        style="background:#fff; border:2px solid #2e7d32;"></span> In portafoglio</div>
                <div class="legend-row">
                    <span class="legend-cloud">
                        <svg viewBox="0 0 30 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M6 16 C2 16 0 13.5 0 10.5 C0 7.5 2.5 5.5 5.5 5.5 C6 3.5 8 2 10.5 2 C13 2 15 3.5 15.5 5.5 C17.5 4 20.5 4 22 6 C23.5 8 23 10.5 21 12 C23.5 12 25.5 13.5 25.5 16 C25.5 18.5 23 20 20.5 20 L8 20 C5.5 20 3.5 18.5 3.5 16 L6 16Z"
                                fill="#666" stroke="#555" stroke-width="0.5" />
                            <path d="M13 7 L10.5 13.5 L14 13.5 L12 18.5 L16.5 11 L13 11 L15 7 L13 7Z" fill="#FFD700"
                                stroke="#FFC107" stroke-width="0.5" />
                        </svg>
                    </span>
                    Invarianza negativa
                </div>
                <div class="legend-row" style="margin-top:4px; border-top:1px solid #eee; padding-top:4px; color:#999;">
                    ⬤ Dim. = Volume &nbsp;|&nbsp; 🖱 Scroll = Zoom
                </div>
            </div>

            <div class="tooltip" id="tooltip"></div>
        </div>

    </div>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        const API_URL = "https://feweb-tunnel.fe-web.eu";

        const credentials = {
            username: new URLSearchParams(window.location.search).get('username') || localStorage.getItem('username'),
            token: new URLSearchParams(window.location.search).get('token') || localStorage.getItem('token'),
            currency: new URLSearchParams(window.location.search).get('currency') || localStorage.getItem('currency') || 'EUR',
            language: localStorage.getItem('language') || 'it_IT'
        };

        let translations = {};
        let _allData = [];
        let _highlightPortfolio = false;
        let _svgRoot = null;
        let _zoomBehavior = null;
        let _marketFilter = 'ALL';
        let _intInversionActive = false;

        // ============================================================
        // TRADUZIONI
        // ============================================================
        async function loadTranslations() {
            try {
                const r = await fetch(`lang/${credentials.language}.json`);
                if (r.ok) translations = await r.json();
            } catch (e) { console.warn('translations not loaded', e); }
        }

        function t(key) { return translations[key] || key; }

        function sectorLabel(s) {
            const k = 'dom.sector:' + s;
            const v = translations[k];
            return (v && v !== k) ? v : s;
        }

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            if (!credentials.username) { window.location.href = 'index.html'; return; }
            document.getElementById('usernameDisplay').textContent = credentials.username;
            document.getElementById('currencyDisplay').textContent = credentials.currency;
            await loadTranslations();
            await fetchStatistics();
        }

        // ============================================================
        // FETCH /getstatistics
        // ============================================================
        async function fetchStatistics() {
            document.getElementById('loadingStatus').textContent = 'Chiamata /getstatistics...';
            try {
                const resp = await fetch(`${API_URL}/getstatistics`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: credentials.username,
                        token: credentials.token,
                        currency: credentials.currency,
                        language: credentials.language,
                        filter: null
                    })
                });

                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

                const result = await resp.json();

                if (result.status !== 'ok') {
                    showMessage(result.msg || 'Errore API', 'error');
                    return;
                }

                if (result.date_creation) {
                    document.getElementById('dateCreationDisplay').textContent = result.date_creation;
                    document.getElementById('date-creation-container').style.display = 'block';
                }

                _allData = result.data || [];
                if (_allData.length === 0) {
                    showMessage('Nessun dato disponibile (PE 0-20).', 'warning');
                    document.getElementById('loadingOverlay').style.display = 'none';
                    return;
                }

                document.getElementById('loadingStatus').textContent = `${_allData.length} strumenti ricevuti. Rendering...`;
                populateMarketSelector(_allData);
                applyFilters();

            } catch (err) {
                console.error(err);
                showMessage('Impossibile raggiungere il server: ' + err.message, 'error');
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        // ============================================================
        // SHAPE: NUVOLA CON FULMINE
        // ============================================================
        function cloudPath(cx, cy, r) {
            // Nuvola più grande con fulmine giallo incorporato
            const s = r * 0.85; // scala più grande per nuvole più visibili
            const cloud = `M ${cx - s * 1.2} ${cy + s * 0.3}
                    C ${cx - s * 1.6} ${cy + s * 0.8}, ${cx - s * 0.8} ${cy + s * 1.0}, ${cx - s * 0.3} ${cy + s * 0.6}
                    C ${cx - s * 0.6} ${cy + s * 1.2}, ${cx + s * 0.6} ${cy + s * 1.2}, ${cx + s * 0.3} ${cy + s * 0.6}
                    C ${cx + s * 0.8} ${cy + s * 1.0}, ${cx + s * 1.6} ${cy + s * 0.8}, ${cx + s * 1.2} ${cy + s * 0.3}
                    C ${cx + s * 1.8} ${cy + s * 0.1}, ${cx + s * 1.4} ${cy - s * 0.6}, ${cx + s * 0.8} ${cy - s * 0.4}
                    C ${cx + s * 1.0} ${cy - s * 0.9}, ${cx + s * 0.3} ${cy - s * 1.2}, ${cx} ${cy - s * 0.8}
                    C ${cx - s * 0.3} ${cy - s * 1.2}, ${cx - s * 1.0} ${cy - s * 0.9}, ${cx - s * 0.8} ${cy - s * 0.4}
                    C ${cx - s * 1.4} ${cy - s * 0.6}, ${cx - s * 1.8} ${cy + s * 0.1}, ${cx - s * 1.2} ${cy + s * 0.3}
                    Z`;

            // Fulmine all'interno della nuvola
            const lightning = `M ${cx - s * 0.25} ${cy - s * 0.5}
                    L ${cx - s * 0.6} ${cy + s * 0.1}
                    L ${cx - s * 0.15} ${cy + s * 0.1}
                    L ${cx - s * 0.3} ${cy + s * 0.6}
                    L ${cx + s * 0.35} ${cy - s * 0.1}
                    L ${cx - s * 0.05} ${cy - s * 0.1}
                    Z`;

            return { cloud, lightning };
        }

        // ============================================================
        // BUILD TIMELINE
        // ============================================================
        function buildTimeline(data) {
            const wrapper = document.getElementById('graphWrapper');
            const W = wrapper.clientWidth || 1200;
            const H = wrapper.clientHeight || 700;

            const dateSet = [...new Set(data.map(d => d.date_start).filter(Boolean))].sort();
            const sectorSet = [...new Set(data.map(d => d.sector || 'N/D'))].sort();

            const nDates = dateSet.length;
            const nSectors = sectorSet.length;

            const MARGIN = { top: 50, right: 30, bottom: 50, left: 160 };
            const innerW = Math.max(W - MARGIN.left - MARGIN.right, nDates * 90);
            const innerH = Math.max(H - MARGIN.top - MARGIN.bottom, nSectors * 80);

            const xScale = d3.scalePoint()
                .domain(dateSet)
                .range([0, innerW])
                .padding(0.5);

            const yScale = d3.scalePoint()
                .domain(sectorSet)
                .range([0, innerH])
                .padding(0.5);

            const svgEl = document.getElementById('timeline-svg');
            d3.select(svgEl).selectAll('*').remove();

            const svg = d3.select(svgEl)
                .attr('width', W)
                .attr('height', H);

            _svgRoot = svg;

            svg.append('rect')
                .attr('width', W).attr('height', H)
                .attr('fill', '#fafafa');

            const g = svg.append('g')
                .attr('class', 'main-g')
                .attr('transform', `translate(${MARGIN.left},${MARGIN.top})`);

            // Griglia
            g.append('g').attr('class', 'grid-v')
                .selectAll('line').data(dateSet).enter()
                .append('line')
                .attr('x1', d => xScale(d)).attr('x2', d => xScale(d))
                .attr('y1', -20).attr('y2', innerH + 20)
                .attr('stroke', '#e0e0e0').attr('stroke-width', 1)
                .attr('stroke-dasharray', '4,4');

            const bandH = yScale.step();
            g.append('g').attr('class', 'swimlanes')
                .selectAll('rect').data(sectorSet).enter()
                .append('rect')
                .attr('x', -MARGIN.left)
                .attr('y', d => yScale(d) - bandH / 2)
                .attr('width', innerW + MARGIN.left + MARGIN.right)
                .attr('height', bandH)
                .attr('fill', (d, i) => i % 2 === 0 ? 'rgba(0,0,0,0.02)' : 'transparent');

            // Asse X
            const xAxis = d3.axisTop(xScale)
                .tickSize(0)
                .tickFormat(d => d);

            g.append('g').attr('class', 'axis-x')
                .call(xAxis)
                .selectAll('text')
                .attr('font-family', 'Orbitron, sans-serif')
                .attr('font-size', 9)
                .attr('fill', '#555')
                .attr('transform', 'rotate(-30)')
                .attr('text-anchor', 'start');

            g.select('.axis-x .domain').remove();

            // Asse Y
            g.append('g').attr('class', 'axis-y')
                .selectAll('text').data(sectorSet).enter()
                .append('text')
                .attr('x', -8)
                .attr('y', d => yScale(d))
                .attr('dy', '0.35em')
                .attr('text-anchor', 'end')
                .attr('font-family', 'Orbitron, sans-serif')
                .attr('font-size', 9)
                .attr('fill', '#333')
                .attr('font-weight', '600')
                .text(d => sectorLabel(d).substring(0, 22));

            g.append('g').attr('class', 'grid-h')
                .selectAll('line').data(sectorSet).enter()
                .append('line')
                .attr('x1', -MARGIN.left).attr('x2', innerW)
                .attr('y1', d => yScale(d)).attr('y2', d => yScale(d))
                .attr('stroke', '#d0d0d0').attr('stroke-width', 0.8);

            // ---- NODI ----
            const cellMap = {};
            data.forEach(item => {
                const ds = item.date_start || '';
                const sc = item.sector || 'N/D';
                const key = ds + '|' + sc;
                if (!cellMap[key]) cellMap[key] = [];
                cellMap[key].push(item);
            });

            const jitterMax = Math.min(20, bandH * 0.30);
            const nodeData = [];

            Object.entries(cellMap).forEach(([key, items]) => {
                const [ds, sc] = key.split('|');
                const cx = xScale(ds);
                const cy = yScale(sc);
                if (cx === undefined || cy === undefined) return;

                const n = items.length;
                items.forEach((item, idx) => {
                    const offset = n === 1 ? 0 : (idx / (n - 1) - 0.5) * 2 * jitterMax;
                    const forza = parseFloat(item.forza) || 0;
                    const invarianza = parseFloat(item.invariance_days) || 0;
                    const vol = parseFloat(item['instrument@volume']) || 1000;
                    const r = Math.max(5, Math.min(14, 3 + Math.log10(vol + 1) * 2.8));
                    const color = forza < 0 ? '#f44336' : '#4caf50';
                    nodeData.push({
                        ...item,
                        _cx: cx,
                        _cy: cy + offset,
                        _r: r,
                        _color: color,
                        _sector: sc,
                        _forza: forza,
                        _invarianza: invarianza,
                        _isCloud: invarianza < 0,
                        _vol: vol
                    });
                });
            });

            const nodeG = g.append('g').attr('class', 'nodes');
            const tooltip = document.getElementById('tooltip');

            function nodeMouseEnter(event, d) {
                d3.select(this)
                    .transition().duration(120)
                    .attr('stroke', '#000').attr('stroke-width', 2.5);
                showTooltip(event, d);
            }
            function nodeMouseMove(event, d) {
                positionTooltip(event);
            }
            function nodeMouseLeave(event, d) {
                d3.select(this)
                    .transition().duration(120)
                    .attr('stroke', d.portfolio ? '#2e7d32' : d._color)
                    .attr('stroke-width', d.portfolio ? 2.5 : 1.2);
                tooltip.classList.remove('visible');
            }

            const circleData = nodeData.filter(d => !d._isCloud);
            const cloudData = nodeData.filter(d => d._isCloud);

            // ---- GRADIENTI ----
            const defs = svg.append('defs');

            const gradGreen = defs.append('radialGradient')
                .attr('id', 'gradGreen')
                .attr('cx', '35%').attr('cy', '35%');
            gradGreen.append('stop').attr('offset', '0%').attr('stop-color', '#81c784');
            gradGreen.append('stop').attr('offset', '100%').attr('stop-color', '#388e3c');

            const gradRed = defs.append('radialGradient')
                .attr('id', 'gradRed')
                .attr('cx', '35%').attr('cy', '35%');
            gradRed.append('stop').attr('offset', '0%').attr('stop-color', '#ef9a9a');
            gradRed.append('stop').attr('offset', '100%').attr('stop-color', '#c62828');

            const gradGreenPort = defs.append('radialGradient')
                .attr('id', 'gradGreenPort')
                .attr('cx', '35%').attr('cy', '35%');
            gradGreenPort.append('stop').attr('offset', '0%').attr('stop-color', '#a5d6a7');
            gradGreenPort.append('stop').attr('offset', '100%').attr('stop-color', '#2e7d32');

            const gradRedPort = defs.append('radialGradient')
                .attr('id', 'gradRedPort')
                .attr('cx', '35%').attr('cy', '35%');
            gradRedPort.append('stop').attr('offset', '0%').attr('stop-color', '#ef9a9a');
            gradRedPort.append('stop').attr('offset', '100%').attr('stop-color', '#b71c1c');

            function getGradient(d) {
                if (d.portfolio) {
                    return d._forza < 0 ? 'url(#gradRedPort)' : 'url(#gradGreenPort)';
                }
                return d._forza < 0 ? 'url(#gradRed)' : 'url(#gradGreen)';
            }

            // ---- CERCHI ----
            nodeG.selectAll('circle.node-ball').data(circleData).enter()
                .append('circle')
                .attr('cx', d => d._cx)
                .attr('cy', d => d._cy)
                .attr('r', d => d._r)
                .attr('fill', d => getGradient(d))
                .attr('stroke', d => d.portfolio ? '#2e7d32' : d._color)
                .attr('stroke-width', d => d.portfolio ? 2.5 : 1.2)
                .attr('class', d => d.portfolio ? 'node-ball portfolio-node' : 'node-ball')
                .style('cursor', 'pointer')
                .on('mouseenter', nodeMouseEnter)
                .on('mousemove', nodeMouseMove)
                .on('mouseleave', nodeMouseLeave);

            // ---- NUVOLE CON FULMINE ----
            cloudData.forEach(d => {
                const shapes = cloudPath(d._cx, d._cy, d._r);

                // Nuvola
                const cloudGroup = nodeG.append('g')
                    .attr('class', d.portfolio ? 'node-cloud portfolio-node' : 'node-cloud')
                    .style('cursor', 'pointer')
                    .on('mouseenter', nodeMouseEnter)
                    .on('mousemove', nodeMouseMove)
                    .on('mouseleave', nodeMouseLeave);

                cloudGroup.append('path')
                    .attr('d', shapes.cloud)
                    .attr('fill', getGradient(d))
                    .attr('stroke', d.portfolio ? '#2e7d32' : d._color)
                    .attr('stroke-width', d.portfolio ? 2.5 : 1.2)
                    .attr('fill-opacity', 0.85);

                // Fulmine giallo
                cloudGroup.append('path')
                    .attr('d', shapes.lightning)
                    .attr('fill', '#FFD700')
                    .attr('stroke', '#FFC107')
                    .attr('stroke-width', 0.8)
                    .attr('fill-opacity', 0.95);
            });

            // ---- ETICHETTE ----
            nodeG.selectAll('text.node-label').data(nodeData.filter(d => d._r >= 7)).enter()
                .append('text')
                .attr('class', 'node-label')
                .attr('x', d => d._cx)
                .attr('y', d => d._cy + d._r + 9)
                .attr('text-anchor', 'middle')
                .attr('font-family', 'Orbitron, sans-serif')
                .attr('font-size', 6.5)
                .attr('fill', '#444')
                .attr('pointer-events', 'none')
                .text(d => d.id_instrument);

            // ---- ZOOM ----
            _zoomBehavior = d3.zoom()
                .scaleExtent([0.2, 6])
                .on('zoom', event => {
                    g.attr('transform', `translate(${MARGIN.left + event.transform.x},${MARGIN.top + event.transform.y}) scale(${event.transform.k})`);
                });

            svg.call(_zoomBehavior);

            // ---- FINALIZE ----
            document.getElementById('statCount').textContent = data.length;
            document.getElementById('statSectors').textContent = sectorSet.length;
            document.getElementById('statDates').textContent = dateSet.length;
            document.getElementById('statsBar').style.display = 'block';
            document.getElementById('legend').style.display = 'block';
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // ============================================================
        // TOOLTIP
        // ============================================================
        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            const forza = d._forza;
            const fc = forza < 0 ? 'tt-neg' : 'tt-pos';
            const pe = d.PE && d.PE !== 'None' ? parseFloat(d.PE).toFixed(1) : '-';
            const eps = d.EPS && d.EPS !== 'None' ? d.EPS : '-';

            tooltip.innerHTML = `
        <div class="tt-id">${d.id_instrument || '-'}</div>
        <div class="tt-desc">${(d.instrument_description || '').substring(0, 40)}</div>
        <div style="margin-bottom:4px;">
            <span class="tt-badge tt-sector">${sectorLabel(d._sector)}</span>
            <span class="tt-badge tt-market">${d.code_market || '-'}</span>
            ${d.portfolio ? '<span class="tt-badge tt-portfolio">★ Portfolio</span>' : ''}
        </div>
        <div style="border-top:1px solid #444; padding-top:5px;">
            <div>Data: ${d.date_start || '-'}</div>
            <div>Forza: <span class="${fc}">${forza.toFixed(3)}</span></div>
            <div>Close: ${d['price@close'] || '-'} ${d.currency || ''}</div>
            <div>Volume: ${d['instrument@volume'] ? parseFloat(d['instrument@volume']).toLocaleString() : '-'}</div>
            <div>P/E: ${pe} &nbsp;|&nbsp; EPS: ${eps}</div>
            <div>Cap: ${d.market_capitalization || '-'}</div>
            <div>Inv. days: ${d.invariance_days || '-'}</div>
        </div>
    `;
            tooltip.classList.add('visible');
            positionTooltip(event);
        }

        function positionTooltip(event) {
            const tooltip = document.getElementById('tooltip');
            const wrapper = document.getElementById('graphWrapper');
            const wr = wrapper.getBoundingClientRect();
            const TW = 260, TH = 230;
            let left = event.clientX - wr.left + 14;
            let top = event.clientY - wr.top - 10;
            if (left + TW > wr.width) left = event.clientX - wr.left - TW - 14;
            if (top + TH > wr.height) top = wr.height - TH - 10;
            if (top < 6) top = 6;
            if (left < 6) left = 6;
            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
        }

        // ============================================================
        // CONTROLS
        // ============================================================
        function resetZoom() {
            if (_svgRoot && _zoomBehavior) {
                _svgRoot.transition().duration(500)
                    .call(_zoomBehavior.transform, d3.zoomIdentity);
            }
        }

        function togglePortfolioHighlight() {
            _highlightPortfolio = !_highlightPortfolio;
            const btn = document.getElementById('togglePortfolioBtn');
            btn.style.background = _highlightPortfolio ? '#2e7d32' : '#000';

            d3.selectAll('.node-ball, .node-cloud')
                .transition().duration(200)
                .attr('fill-opacity', d => {
                    if (!_highlightPortfolio) return 1;
                    return d.portfolio ? 1 : 0.12;
                });
        }

        function populateMarketSelector(data) {
            const select = document.getElementById('marketSelect');
            const markets = [...new Set(data.map(d => d.code_market).filter(Boolean))].sort();

            select.querySelectorAll('option:not([value="ALL"])').forEach(o => o.remove());

            markets.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                select.appendChild(opt);
            });

            select.value = _marketFilter;
        }

        function onMarketChange() {
            _marketFilter = document.getElementById('marketSelect').value;
            applyFilters();
        }

        function toggleIntInversion() {
            _intInversionActive = !_intInversionActive;
            const btn = document.getElementById('intInversionBtn');
            btn.classList.toggle('active-filter', _intInversionActive);
            applyFilters();
        }

        function applyFilters() {
            let filtered = _allData;

            if (_marketFilter !== 'ALL') {
                filtered = filtered.filter(d => d.code_market === _marketFilter);
            }

            if (_intInversionActive) {
                filtered = filtered.filter(d => {
                    const forza = parseFloat(d.forza) || 0;
                    const invarianza = parseFloat(d.invariance_days) || 0;
                    return forza < 0 && invarianza < 0;
                });
            }

            if (filtered.length === 0) {
                showMessage('Nessun dato disponibile con i filtri selezionati.', 'warning');
                document.getElementById('statsBar').style.display = 'none';
                document.getElementById('legend').style.display = 'none';
                d3.select('#timeline-svg').selectAll('*').remove();
                return;
            }

            document.getElementById('message').style.display = 'none';
            buildTimeline(filtered);
        }

        // ============================================================
        // UTILITY
        // ============================================================
        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = `message ${type}`;
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // ============================================================
        // START
        // ============================================================
        window.onload = init;
    </script>
</body>

</html>
