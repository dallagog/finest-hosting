<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Request Entry</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f5f0;
            --neon-cyan: #000000;
            --neon-blue: #333333;
            --glass-bg: #ffffff;
            --text-color: #333333;
            --border-color: #000000;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary-color: #64748b;
            --secondary-hover: #475569;
            --success-color: #10b981;
            --error-color: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            padding: 20px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        .user-info-left {
            flex: 1;
            text-align: left;
            font-size: 14px;
            color: var(--neon-cyan);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .user-info-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .flag-icon {
            font-size: 18px;
        }

        .logout-container {
            flex: 1;
            text-align: right;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #000;
            border: 1px solid #000;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            background: #333;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .subtitle {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .instrument-selector {
            background: var(--glass-bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .selector-label {
            display: block;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .selector-select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        /* ====== Two-column layout ====== */
        .request-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        .column-panel {
            background: var(--glass-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .column-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .column-panel .panel-title {
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .xml-editor {
            width: 100%;
            flex: 1;
            min-height: 450px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: vertical;
            background: #fafafa;
            color: #222;
            outline: none;
            tab-size: 2;
        }

        .xml-editor:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .result-viewer {
            width: 100%;
            flex: 1;
            min-height: 450px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            background: #f0f0f0;
            color: #333;
            overflow: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            font-family: inherit;
        }

        .btn-primary {
            background: #000;
            color: white;
        }

        .btn-primary:hover {
            background: #333;
        }

        .btn-primary:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: #000;
            border: 1px solid #000;
        }

        .btn-secondary:hover {
            background: #eee;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .form-actions {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            text-align: center;
            font-weight: bold;
            animation: fadeIn 0.3s ease-out;
        }

        .status-error {
            background-color: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .status-success {
            background-color: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top: 3px solid #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .request-columns {
                grid-template-columns: 1fr;
            }

            .header-bar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .logout-container {
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <div class="header-bar">
        <div class="user-info-left">
            <div class="user-info-row">
                <strong id="userLabel">Utente:</strong>
                <span id="usernameDisplay">-</span>
            </div>
            <div class="user-info-row">
                <span class="flag-icon" id="languageFlag"></span>
                <span id="languageDisplay">-</span>
            </div>
        </div>
        <div style="flex: 1; text-align: center;">
            <h1 id="pageTitleHeader"
                style="font-size: 1.5rem; font-weight: 700; color: #000; text-transform: uppercase; letter-spacing: 2px;">
                Request Entry</h1>
        </div>
        <div class="logout-container" style="display: flex; align-items: center; justify-content: flex-end; gap: 15px;">
            <a href="dashboard-main.html" class="logout-btn">
                <i class="fa fa-times-circle"></i> <span id="closeText">Chiudi</span>
            </a>
        </div>
    </div>

    <div class="container">
        <p class="subtitle" id="pageSubtitle">Request Data Entry</p>

        <!-- ====== Selector based on dom.request: ====== -->
        <div class="instrument-selector">
            <label for="request-type-selector" class="selector-label">
                <i class="fa fa-list-alt"></i> <span id="requestTypeLabel">Tipo Richiesta:</span>
            </label>
            <select id="request-type-selector" class="selector-select" onchange="onRequestTypeChange()">
            </select>
        </div>

        <!-- ====== Two-column area ====== -->
        <div class="request-columns">

            <!-- LEFT: XML request input -->
            <div class="column-panel">
                <div class="panel-header">
                    <span class="panel-title"><i class="fa fa-code"></i> <span id="requestPanelLabel">Richiesta
                            XML</span></span>
                    <div style="display: flex; gap: 8px;">
                        <button type="button" class="btn btn-primary btn-sm" id="btnSendRequest" onclick="sendRequest()">
                            <i class="fa fa-paper-plane"></i> <span id="btnSendLabel">Invia Richiesta</span>
                        </button>
                        <button type="button" class="btn btn-secondary btn-sm" onclick="clearRequestEditor()">
                            <i class="fa fa-eraser"></i>
                        </button>
                    </div>
                </div>
                <textarea id="xml-request-editor" class="xml-editor"
                    placeholder="Inserisci o incolla qui la richiesta XML..."></textarea>
            </div>

            <!-- RIGHT: Result output -->
            <div class="column-panel">
                <div class="panel-header">
                    <span class="panel-title"><i class="fa fa-poll"></i> <span
                            id="resultPanelLabel">Risultato</span></span>
                    <div style="display: flex; gap: 8px;">
                        <button type="button" class="btn btn-secondary btn-sm" onclick="copyResultToClipboard()"
                            title="Copia">
                            <i class="fa fa-copy"></i>
                        </button>
                        <button type="button" class="btn btn-secondary btn-sm" onclick="clearResult()">
                            <i class="fa fa-eraser"></i>
                        </button>
                    </div>
                </div>
                <div id="result-viewer" class="result-viewer">In attesa di una richiesta...</div>
            </div>

        </div>



        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>
        let credentials = { username: '', token: '', language: 'it_IT' };
        let translations = {};
        let availableLanguages = [];
        const API_URL = 'https://feweb-tunnel.fe-web.eu';
        const API_URL_MARKET = 'https://market-tunnel.fe-web.eu';

        // ========== INIT ==========
        async function loadAllData() {
            getURLParams();
            await initializeLanguages();
            await loadTranslations(credentials.language);
            await updateHeaderWithUserInfo();
            populateRequestTypeSelector();
        }

        function getURLParams() {
            const params = new URLSearchParams(window.location.search);
            const urlParams = {};
            for (const [key, value] of params.entries()) { urlParams[key] = value; }
            credentials = {
                username: urlParams.username || localStorage.getItem('username') || '',
                token: urlParams.token || localStorage.getItem('token') || '',
                language: urlParams.language || localStorage.getItem('language') || 'it_IT'
            };
        }

        // ========== LANGUAGE ==========
        async function loadLanguageManifest() {
            try {
                const response = await fetch('lang/manifest.json');
                const data = await response.json();
                return data.languages || [];
            } catch (error) { console.error('Error loading manifest:', error); return []; }
        }

        async function loadLanguageFile(langCode) {
            try {
                const response = await fetch(`lang/${langCode}.json`);
                if (response.ok) {
                    const data = await response.json();
                    return {
                        code: langCode,
                        name: data['int.language.description'] || langCode,
                        flag: data['img.language.flag'] || ''
                    };
                }
                return null;
            } catch (error) { console.error(`Error loading ${langCode}.json:`, error); return null; }
        }

        async function initializeLanguages() {
            const langCodes = await loadLanguageManifest();
            for (const langCode of langCodes) {
                const langData = await loadLanguageFile(langCode);
                if (langData) availableLanguages.push(langData);
            }
        }

        async function loadTranslations(langCode) {
            try {
                const response = await fetch(`lang/${langCode}.json`);
                if (!response.ok) return;
                translations = await response.json();
                applyTranslations();
            } catch (error) { console.error("Error loading translations:", error); }
        }

        function getTranslation(key) { return translations[key] || key; }

        function applyTranslations() {
            const el = (id) => document.getElementById(id);
            el('pageTitle').textContent = getTranslation('int.request') || 'Request Entry';
            el('pageTitleHeader').textContent = getTranslation('int.request') || 'Request Entry';
            el('pageSubtitle').textContent = getTranslation('int.request') || 'Request Data Entry';
            el('closeText').textContent = getTranslation('int.close') || 'Chiudi';
            el('userLabel').textContent = getTranslation('int.user.label') || 'Utente:';
            el('requestTypeLabel').textContent = getTranslation('int.request.type') || 'Tipo Richiesta:';
            el('requestPanelLabel').textContent = getTranslation('int.request.xml') || 'Richiesta XML';
            el('resultPanelLabel').textContent = getTranslation('int.request.result') || 'Risultato';
            el('btnSendLabel').textContent = getTranslation('int.request.send') || 'Invia Richiesta';
            el('btnLoadTemplateLabel').textContent = getTranslation('int.template') || 'Template';
        }

        async function updateHeaderWithUserInfo() {
            const userLanguage = credentials.language || 'it_IT';
            document.getElementById('usernameDisplay').textContent = credentials.username || '-';
            const langData = availableLanguages.find(l => l.code === userLanguage);
            if (langData) {
                document.getElementById('languageFlag').textContent = langData.flag;
                const langDescription = getTranslation('int.language.description');
                document.getElementById('languageDisplay').textContent =
                    langDescription !== 'int.language.description' ? langDescription : langData.name;
            }
        }

        // ========== REQUEST TYPE SELECTOR (dom.request:) ==========
        function populateRequestTypeSelector() {
            const selector = document.getElementById('request-type-selector');
            selector.innerHTML = '';

            // Find all dom.request: keys in translations
            const requestKeys = Object.keys(translations).filter(k => k.startsWith('dom.request:'));

            if (requestKeys.length === 0) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = '—';
                selector.appendChild(option);
                return;
            }

            requestKeys.forEach(key => {
                const option = document.createElement('option');
                const value = key.split(':').pop(); // e.g. "user", "dbcore", "dbmkt"
                option.value = value;
                option.textContent = getTranslation(key);
                selector.appendChild(option);
            });
        }

        function onRequestTypeChange() {
            const selector = document.getElementById('request-type-selector');
            const selectedValue = selector.value;
            console.log('Request type changed to:', selectedValue);
        }

        // ========== XML EDITOR ==========
        function clearRequestEditor() {
            document.getElementById('xml-request-editor').value = '';
        }

        function loadTemplateXml() {
            const sampleXml =
                `<?xml version="1.0" encoding="UTF-8"?>
<REQUEST
  ID_REQUEST=""
  TYPE_REQUEST=""
  DESCRIPTION_REQUEST="">

  <DEMAND_REF>
    <ID_DEMAND></ID_DEMAND>
  </DEMAND_REF>

  <HEADER>
    <TYPE_REQUEST></TYPE_REQUEST>
    <TYPE_ENGINE>INTERNAL</TYPE_ENGINE>
    <DESCRIPTION_REQUEST></DESCRIPTION_REQUEST>
    <DATE_START></DATE_START>
    <DATE_END></DATE_END>
    <DATE_REQUEST></DATE_REQUEST>
  </HEADER>

  <ACCOUNTS>
    <ACCOUNT ID="">
      <INSTRUMENTS>
        <INSTRUMENT ID=""/>
      </INSTRUMENTS>
    </ACCOUNT>
  </ACCOUNTS>

</REQUEST>`;
            document.getElementById('xml-request-editor').value = sampleXml;
        }

        // ========== RESULT VIEWER ==========
        function clearResult() {
            document.getElementById('result-viewer').textContent = 'In attesa di una richiesta...';
        }

        function copyResultToClipboard() {
            const text = document.getElementById('result-viewer').textContent;
            if (text && text !== 'In attesa di una richiesta...') {
                navigator.clipboard.writeText(text).then(() => {
                    showStatus(getTranslation('int.copied') || 'Copiato!', 'success');
                }).catch(() => {
                    showStatus('Errore copia', 'error');
                });
            }
        }

        function showStatus(text, type) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = text;
            statusEl.className = 'status-message ' + (type === 'success' ? 'status-success' : 'status-error');
            statusEl.style.display = 'block';
            setTimeout(() => { statusEl.style.display = 'none'; }, 4000);
        }

        // ========== SEND REQUEST ==========
        async function sendRequest() {
            const xmlContent = document.getElementById('xml-request-editor').value.trim();
            const requestType = document.getElementById('request-type-selector').value;

            if (!xmlContent) {
                showStatus(getTranslation('int.request.empty') || 'Inserire una richiesta XML', 'error');
                return;
            }

            const btn = document.getElementById('btnSendRequest');
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner" style="width:15px; height:15px; border-top-color: #fff;"></div> ' +
                (getTranslation('int.inprogress') || 'Elaborazione...');

            try {
                const payload = {
                    username: credentials.username,
                    token: credentials.token,
                    language: credentials.language,
                    request_type: requestType,
                    request_xml: xmlContent
                };

                const targetApiUrl = (requestType === 'user') ? API_URL : API_URL_MARKET;

                const response = await fetch(`${targetApiUrl}/putrequest`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                const viewer = document.getElementById('result-viewer');

                if (result.status === 'ok') {
                    viewer.textContent = result.data
                        ? (typeof result.data === 'string' ? result.data : JSON.stringify(result.data, null, 2))
                        : result.msg || 'OK';
                    showStatus(getTranslation('int.success.save') || 'Richiesta inviata con successo!', 'success');
                } else {
                    viewer.textContent = 'ERRORE: ' + (result.msg || JSON.stringify(result, null, 2));
                    showStatus('Errore: ' + (result.msg || 'Errore sconosciuto'), 'error');
                }
            } catch (err) {
                console.error('Send request error:', err);
                document.getElementById('result-viewer').textContent = 'ERRORE: ' + err.message;
                showStatus('Errore di connessione: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

        document.addEventListener('DOMContentLoaded', loadAllData);
    </script>
</body>

</html>
