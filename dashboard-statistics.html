<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statistics 0.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="js/dashboard-shared.js"></script>
    <link rel="icon" type="image/png" href="images/icon-finest.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap');

        :root {
            --bg-color: #f5f5f0;
            --neon-cyan: #000000;
            --neon-blue: #333333;
            --glass-bg: #ffffff;
            --text-color: #333333;
            --border-color: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: var(--bg-color);
            padding: 20px;
            color: var(--text-color);
            min-height: 100vh;
        }

        .main-container {
            width: 100%;
            margin: 0;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .user-info-left {
            flex: 1;
            font-size: 14px;
            color: var(--neon-cyan);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        h1 {
            flex: 1;
            text-align: center;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5em;
        }

        .close-btn {
            padding: 8px 16px;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff3333;
            color: #ff3333;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            font-weight: bold;
        }

        .close-btn:hover {
            background: rgba(255, 0, 0, 0.4);
            box-shadow: 0 0 10px #ff3333;
        }

        .collapsible-container {
            background: var(--glass-bg);
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .filter-group {
            margin-bottom: 15px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 0.9rem;
        }

        .filter-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
        }

        button {
            padding: 10px 20px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .data-table th,
        .data-table td {
            padding: 4px 8px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .data-table th {
            background: #f0f0f0;
        }

        /* RIGHE ALTERNE CHIARO/GRIGIO */
        .data-table tbody tr {
            transition: background 0.2s;
            cursor: pointer;
        }

        .data-table tbody tr:nth-child(even) {
            background-color: #f9f9f9;
            /* Grigio chiaro */
        }

        .data-table tbody tr:nth-child(odd) {
            background-color: #ffffff;
            /* Bianco */
        }

        .data-table tbody tr:hover {
            background: #f0f0f0 !important;
            /* Grigio più scuro al passaggio del mouse */
        }

        .data-table tbody tr.selected {
            background: #e0e0e0 !important;
            /* Grigio per riga selezionata */
            border-left: 3px solid #000;
        }

        .message {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
            border-left: 5px solid;
        }

        .message.error {
            background: #fee;
            color: #c00;
            border-color: #c00;
            display: block;
        }

        .message.warning {
            background: #fff3cd;
            color: #856404;
            border-color: #ffc107;
            display: block;
        }

        /* Multi-selection dropdown styles */
        .dropdown-check-list {
            display: inline-block;
            position: relative;
        }

        .dropdown-check-list .anchor {
            position: relative;
            cursor: pointer;
            display: inline-block;
            padding: 10px 30px 10px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            font-size: 14px;
            min-width: 150px;
            text-align: left;
            width: 100%;
        }

        .dropdown-check-list .anchor:after {
            position: absolute;
            content: "";
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 5px solid #000;
            right: 10px;
            top: 45%;
        }

        .dropdown-check-list .items {
            padding: 8px;
            display: none;
            position: absolute;
            z-index: 1001;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-height: 300px;
            overflow-y: auto;
        }

        .dropdown-check-list.visible .items {
            display: block;
        }

        .dropdown-check-list .items label {
            display: block;
            padding: 5px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
        }

        .dropdown-check-list .items label:hover {
            background-color: #f0f0f0;
        }

        .dropdown-check-list input[type="checkbox"] {
            margin-right: 8px;
            width: auto;
        }

        /* Instrument search widget */
        .instrument-search-wrapper {
            position: relative;
            width: 100%;
        }

        .instrument-search-field {
            width: 100%;
            padding: 10px 36px 10px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
            font-size: 13px;
            background: #fff;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .instrument-search-field:focus {
            outline: none;
            border-color: #000;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.08);
        }

        .instrument-search-clear {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            font-size: 14px;
            display: none;
            background: none;
            border: none;
            padding: 2px 4px;
            line-height: 1;
            transition: color 0.2s;
        }

        .instrument-search-clear:hover {
            color: #333;
        }

        .instrument-search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #000;
            border-top: none;
            z-index: 1002;
            max-height: 320px;
            overflow-y: auto;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
            border-radius: 0 0 6px 6px;
            display: none;
        }

        .inst-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            gap: 3px;
            transition: background 0.15s;
        }

        .inst-item:last-child {
            border-bottom: none;
        }

        .inst-item:hover,
        .inst-item.active {
            background: #f5f5f5;
        }

        .inst-item-main {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .inst-item-id {
            font-weight: 700;
            color: #000;
            font-size: 0.85em;
            min-width: 70px;
            letter-spacing: 0.5px;
        }

        .inst-item-desc {
            font-size: 0.82em;
            color: #444;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 240px;
        }

        .inst-item-meta {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .inst-badge {
            font-size: 0.68em;
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .inst-badge-sector {
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #bbdefb;
        }

        .inst-badge-type {
            background: #f3e5f5;
            color: #7b1fa2;
            border: 1px solid #e1bee7;
        }

        .inst-item-empty {
            padding: 10px 12px;
            color: #999;
            font-style: italic;
            font-size: 0.85em;
        }

        /* Instrument tooltip */
        .inst-tooltip-anchor {
            position: relative;
            display: inline-block;
        }

        .inst-tooltip {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            position: absolute;
            left: 0;
            top: 100%;
            margin-top: 6px;
            z-index: 2000;
            background: #fff;
            border: 1px solid #000;
            border-radius: 6px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            padding: 10px 14px;
            min-width: 200px;
            font-size: 0.78em;
            font-family: inherit;
            white-space: nowrap;
            transition: opacity 0.15s, visibility 0.15s;
        }

        .inst-tooltip-anchor:hover .inst-tooltip {
            visibility: visible;
            opacity: 1;
        }

        .inst-tooltip table {
            border-collapse: collapse;
            width: 100%;
        }

        .inst-tooltip td {
            padding: 2px 6px;
            border: none;
            background: transparent !important;
        }

        .inst-tooltip td:first-child {
            color: #666;
            font-weight: 600;
            padding-right: 10px;
        }

        .inst-tooltip td:last-child {
            text-align: right;
            color: #000;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="header-bar">
            <div class="user-info-left">
                <div><strong>Utente:</strong> <span id="usernameDisplay">-</span></div>
                <div><strong>Valuta:</strong> <span id="currencyDisplay">-</span></div>
                <div id="date-creation-container" style="display: none;"><strong>Data creazione:</strong> <span
                        id="dateCreationDisplay">-</span></div>
            </div>
            <h1>Market Dashboard</h1>
            <div class="logout-container">
                <button class="graph-btn" onclick="openStatisticsGraph()">Grafici</button>
                <button class="close-btn" onclick="closeDashboard()">Chiudi</button>
            </div>
        </div>

        <div id="message" class="message"></div>

        <div class="collapsible-container">
            <div style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">
                <div class="filter-group" style="flex: 1; min-width: 150px;">
                    <label>Data iniziale:</label>
                    <input type="date" id="date-start">
                </div>
                <div class="filter-group" style="flex: 1; min-width: 150px;">
                    <label>Data finale:</label>
                    <input type="date" id="date-end">
                </div>
                <div class="filter-group" style="flex: 1; min-width: 150px;">
                    <label>Forza min:</label>
                    <input type="number" id="value-min" step="0.01">
                </div>
                <div class="filter-group" style="flex: 1; min-width: 150px;">
                    <label>Forza max:</label>
                    <input type="number" id="value-max" step="0.01">
                </div>
                <div class="filter-group" style="flex: 1; min-width: 150px;">
                    <label>Settore:</label>
                    <div id="sector-filter-container" class="dropdown-check-list" style="width: 100%;">
                        <span class="anchor" onclick="toggleSectorDropdown()" id="sectorSelectorAnchor">Tutti i
                            settori</span>
                        <div id="sectorSelectorItems" class="items">
                            <!-- Checkboxes injected here -->
                        </div>
                    </div>
                </div>
                <div class="filter-group" style="flex: 1; min-width: 150px;">
                    <label>Mercato:</label>
                    <div id="market-filter-container" class="dropdown-check-list" style="width: 100%;">
                        <span class="anchor" onclick="toggleMarketDropdown()" id="marketSelectorAnchor">Tutti i
                            mercati</span>
                        <div id="marketSelectorItems" class="items">
                            <!-- Checkboxes injected here -->
                        </div>
                    </div>
                </div>
                <div class="filter-group" style="flex: 1; min-width: 150px;">
                    <label>Strumento:</label>
                    <div class="instrument-search-wrapper">
                        <input type="text" id="instrument-search-input" class="instrument-search-field"
                            placeholder="Cerca per codice o nome..." autocomplete="off">
                        <button type="button" class="instrument-search-clear" id="instrument-search-clear"
                            title="Cancella">&#x2715;</button>
                        <div class="instrument-search-dropdown" id="instrument-search-dropdown"></div>
                    </div>
                    <input type="hidden" id="instrument-filter" value="">
                </div>
                <div class="filter-group" style="display: flex; align-items: center; gap: 8px; padding-bottom: 12px;">
                    <input type="checkbox" id="inversion-filter"
                        style="width: 16px; height: 16px; margin: 0; cursor: pointer;">
                    <label id="inversion-label" for="inversion-filter" data-translate="int.inversion"
                        style="margin: 0; cursor: pointer; display: inline;"></label>
                </div>
                <div class="filter-group">
                    <button onclick="fetchMarketData()" data-translate="int.apply">Applica selezione</button>
                </div>
            </div>
        </div>

        <div class="collapsible-container">
            <div id="table-container">
                <p>In attesa di caricamento...</p>
            </div>
        </div>
    </div>

    <script>
        // URL Servizio configurato correttamente via Cloudflare Tunnel
        const API_URL_MARKET = "https://market-tunnel.fe-web.eu";

        const credentials = {
            username: localStorage.getItem('username'),
            token: localStorage.getItem('token'),
            currency: localStorage.getItem('currency') || 'EUR',
            date_start: localStorage.getItem('date_start') || '',
            date_end: localStorage.getItem('date_end') || '',
            language: localStorage.getItem('language') || 'it_IT'
        };

        let translations = {};

        async function loadTranslations() {
            try {
                const response = await fetch(`lang/${credentials.language}.json`);
                if (response.ok) {
                    translations = await response.json();
                    applyTranslations();
                }
            } catch (err) {
                console.error("Error loading translations:", err);
            }
        }

        function openStatisticsGraph() {
            const url = `dashboard-statistics-graph.html?username=${credentials.username}&token=${credentials.token}&currency=${credentials.currency}&date_start=${document.getElementById('date-start').value}&date_end=${document.getElementById('date-end').value}`;
            window.open(url, '_blank', 'width=1400,height=900');
        }

        function getTranslation(key) {
            return translations[key] || key;
        }

        function applyTranslations() {
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                el.textContent = getTranslation(key);
            });
        }

        async function init() {
            if (!credentials.username) {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('usernameDisplay').textContent = credentials.username;
            document.getElementById('currencyDisplay').textContent = credentials.currency;

            await loadTranslations();
            setDefaultDates();
            initInstrumentSearch();
            await loadStaticData();
        }

        async function loadStaticData() {
            try {
                const resp = await fetch('statistics.json.gz?_=' + Date.now());
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                // Decomprimi con DecompressionStream (nativo nei browser moderni)
                const ds = new DecompressionStream('gzip');
                const decompressed = resp.body.pipeThrough(ds);
                const text = await new Response(decompressed).text();
                const result = JSON.parse(text);
                if (result.status === 'ok') {
                    if (result.date_creation) {
                        document.getElementById('dateCreationDisplay').textContent = result.date_creation;
                        document.getElementById('date-creation-container').style.display = 'block';
                    }
                    renderTable(result.data);
                } else {
                    showMessage('statistics.json.gz non valido: ' + (result.msg || ''), 'warning');
                }
            } catch (err) {
                console.warn('statistics.json.gz non disponibile:', err);
                showMessage('Dati locali non disponibili. Usare "Applica selezione" per caricare i dati dal server.', 'warning');
            }
        }

        let _selectedSectors = [];
        let _selectedMarkets = [];

        function toggleSectorDropdown() {
            const container = document.getElementById('sector-filter-container');
            container.classList.toggle('visible');

            if (container.classList.contains('visible')) {
                const closeHandler = (e) => {
                    if (!container.contains(e.target)) {
                        container.classList.remove('visible');
                        document.removeEventListener('click', closeHandler);
                    }
                };
                setTimeout(() => document.addEventListener('click', closeHandler), 10);
            }
        }

        function toggleMarketDropdown() {
            const container = document.getElementById('market-filter-container');
            container.classList.toggle('visible');

            if (container.classList.contains('visible')) {
                const closeHandler = (e) => {
                    if (!container.contains(e.target)) {
                        container.classList.remove('visible');
                        document.removeEventListener('click', closeHandler);
                    }
                };
                setTimeout(() => document.addEventListener('click', closeHandler), 10);
            }
        }

        function updateSectorAnchorText() {
            const anchor = document.getElementById('sectorSelectorAnchor');
            if (_selectedSectors.length === 0) {
                anchor.textContent = "Tutti i settori";
            } else if (_selectedSectors.length === 1) {
                anchor.textContent = getSectorLabel(_selectedSectors[0]);
            } else {
                anchor.textContent = `${_selectedSectors.length} selezionati`;
            }
        }

        function updateMarketAnchorText() {
            const anchor = document.getElementById('marketSelectorAnchor');
            if (_selectedMarkets.length === 0) {
                anchor.textContent = "Tutti i mercati";
            } else if (_selectedMarkets.length === 1) {
                anchor.textContent = _selectedMarkets[0];
            } else {
                anchor.textContent = `${_selectedMarkets.length} selezionati`;
            }
        }

        function onSectorChange() {
            const items = document.getElementById('sectorSelectorItems');
            const checkboxes = items.querySelectorAll('input[type="checkbox"]');
            _selectedSectors = [];
            checkboxes.forEach(cb => {
                if (cb.checked) _selectedSectors.push(cb.value);
            });
            updateSectorAnchorText();
            if (_lastData.length > 0) applyFiltersAndRender();
        }

        function onMarketChange() {
            const items = document.getElementById('marketSelectorItems');
            const checkboxes = items.querySelectorAll('input[type="checkbox"]');
            _selectedMarkets = [];
            checkboxes.forEach(cb => {
                if (cb.checked) _selectedMarkets.push(cb.value);
            });
            updateMarketAnchorText();
            if (_lastData.length > 0) applyFiltersAndRender();
        }

        function setDefaultDates() {
            const today = new Date();
            const lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, today.getDate());

            document.getElementById('date-start').value = lastMonth.toISOString().split('T')[0];
            document.getElementById('date-end').value = today.toISOString().split('T')[0];
            document.getElementById('value-min').value = 4;
            document.getElementById('value-max').value = 9999;
        }

        async function fetchMarketData() {
            const date_start = document.getElementById('date-start').value;
            const date_end = document.getElementById('date-end').value;
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'none';

            console.log("Checking health from:", `${API_URL_MARKET}/health`);
            try {
                const healthResponse = await fetch(`${API_URL_MARKET}/health`);
                console.log("Health status:", healthResponse.status);
                const healthResult = await healthResponse.json();
                console.log("Health Result:", healthResult);
            } catch (hErr) {
                console.warn("Health check failed, proceeding anyway:", hErr);
            }

            const payload = {
                username: credentials.username,
                token: credentials.token,
                currency: credentials.currency,
                date_start: date_start,
                date_end: date_end,
                sector: _selectedSectors.length > 0 ? _selectedSectors : null
            };

            console.log("Fetching market data from:", `${API_URL_MARKET}/getmarket`);
            console.log("Payload:", payload);

            try {
                const response = await fetch(`${API_URL_MARKET}/getmarket`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                console.log("Response status:", response.status);
                const result = await response.json();
                console.log("Result:", result);

                if (result.status === 'ok') {
                    if (result.date_creation) {
                        document.getElementById('dateCreationDisplay').textContent = result.date_creation;
                        document.getElementById('date-creation-container').style.display = 'block';
                    } else {
                        document.getElementById('date-creation-container').style.display = 'none';
                    }
                    renderTable(result.data);
                } else {
                    showMessage(result.msg || "Errore API", "error");
                }
            } catch (err) {
                console.error("Fetch Error:", err);
                showMessage(
                    "Impossibile raggiungere il server market-tunnel. Verificare la connessione o i record DNS.",
                    "error"
                );
            }
        }

        let _lastData = [];

        /* ---- Instrument Search Widget ---- */
        let _instrumentIndex = [];   // [{id, description, sector}, ...]
        let _instSelIdx = -1;
        let _instFiltered = [];

        function initInstrumentSearch() {
            const searchInput = document.getElementById('instrument-search-input');
            const clearBtn = document.getElementById('instrument-search-clear');
            const dropdown = document.getElementById('instrument-search-dropdown');
            const hidden = document.getElementById('instrument-filter');

            searchInput.addEventListener('input', () => {
                const q = searchInput.value.trim();
                clearBtn.style.display = q ? 'block' : 'none';
                renderInstDropdown(q);
            });

            searchInput.addEventListener('focus', () => {
                renderInstDropdown(searchInput.value.trim());
            });

            searchInput.addEventListener('keydown', (e) => {
                if (dropdown.style.display === 'none') return;
                if (e.key === 'ArrowDown') { e.preventDefault(); moveInstSel(1); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); moveInstSel(-1); }
                else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (_instSelIdx >= 0 && _instFiltered[_instSelIdx]) selectInstrument(_instFiltered[_instSelIdx]);
                }
                else if (e.key === 'Escape') closeInstDropdown();
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                hidden.value = '';
                clearBtn.style.display = 'none';
                closeInstDropdown();
                applyFiltersAndRender();
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.instrument-search-wrapper')) closeInstDropdown();
            });
        }

        function populateInstrumentSelector(data) {
            const current = document.getElementById('instrument-filter').value;
            // Build index: unique instruments from data
            const seen = new Set();
            _instrumentIndex = [];
            data.forEach(r => {
                if (r.id_instrument && !seen.has(r.id_instrument)) {
                    seen.add(r.id_instrument);
                    _instrumentIndex.push({
                        id: r.id_instrument,
                        description: r.instrument_description || '',
                        sector: r.sector || ''
                    });
                }
            });
            _instrumentIndex.sort((a, b) => a.id.localeCompare(b.id));

            // Restore selection label if still valid
            if (current && _instrumentIndex.find(i => i.id === current)) {
                const inst = _instrumentIndex.find(i => i.id === current);
                document.getElementById('instrument-search-input').value = inst.description
                    ? `${inst.id} — ${inst.description}`
                    : inst.id;
            }
        }

        function renderInstDropdown(query) {
            const dropdown = document.getElementById('instrument-search-dropdown');
            const q = query.toLowerCase();
            _instFiltered = q
                ? _instrumentIndex.filter(i =>
                    i.id.toLowerCase().includes(q) ||
                    i.description.toLowerCase().includes(q) ||
                    i.sector.toLowerCase().includes(q)
                )
                : _instrumentIndex;
            _instFiltered = _instFiltered.slice(0, 60);
            _instSelIdx = -1;

            if (_instFiltered.length === 0) {
                dropdown.innerHTML = `<div class="inst-item-empty">Nessun risultato</div>`;
            } else {
                dropdown.innerHTML = [
                    // "All" option
                    `<div class="inst-item" data-idx="-1">
                        <div class="inst-item-main">
                            <span class="inst-item-id">—</span>
                            <span class="inst-item-desc">Tutti gli strumenti</span>
                        </div>
                     </div>`
                ].concat(_instFiltered.map((inst, i) => {
                    const sector = inst.sector
                        ? `<span class="inst-badge inst-badge-sector">${getSectorLabel(inst.sector)}</span>` : '';
                    return `
                        <div class="inst-item" data-idx="${i}">
                            <div class="inst-item-main">
                                <span class="inst-item-id">${inst.id}</span>
                                <span class="inst-item-desc">${inst.description}</span>
                            </div>
                            <div class="inst-item-meta">${sector}</div>
                        </div>`;
                })).join('');

                dropdown.querySelectorAll('.inst-item').forEach(el => {
                    el.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        const idx = parseInt(el.dataset.idx);
                        if (idx === -1) {
                            clearInstrumentSelection();
                        } else {
                            selectInstrument(_instFiltered[idx]);
                        }
                    });
                });
            }

            dropdown.style.display = 'block';
        }

        function moveInstSel(dir) {
            const dropdown = document.getElementById('instrument-search-dropdown');
            const items = dropdown.querySelectorAll('.inst-item');
            if (!items.length) return;
            _instSelIdx = Math.max(-1, Math.min(_instFiltered.length - 1, _instSelIdx + dir));
            items.forEach((el, i) => el.classList.toggle('active', i - 1 === _instSelIdx));
            const activeEl = dropdown.querySelector('.inst-item.active');
            if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
        }

        function selectInstrument(inst) {
            const searchInput = document.getElementById('instrument-search-input');
            const hidden = document.getElementById('instrument-filter');
            const clearBtn = document.getElementById('instrument-search-clear');
            searchInput.value = inst.description ? `${inst.id} — ${inst.description}` : inst.id;
            hidden.value = inst.id;
            clearBtn.style.display = 'block';
            closeInstDropdown();
            applyFiltersAndRender();
        }

        function clearInstrumentSelection() {
            const searchInput = document.getElementById('instrument-search-input');
            const hidden = document.getElementById('instrument-filter');
            const clearBtn = document.getElementById('instrument-search-clear');
            searchInput.value = '';
            hidden.value = '';
            clearBtn.style.display = 'none';
            closeInstDropdown();
            applyFiltersAndRender();
        }

        function closeInstDropdown() {
            document.getElementById('instrument-search-dropdown').style.display = 'none';
            _instSelIdx = -1;
        }

        function getSectorLabel(sector) {
            const translated = getTranslation('dom.sector:' + sector);
            return translated && translated !== ('dom.sector:' + sector)
                ? translated
                : sector;
        }

        function populateSectorSelector(data) {
            const container = document.getElementById('sectorSelectorItems');
            const sectors = [...new Set(data.map(r => r.sector).filter(Boolean))].sort();

            const previousSelection = [..._selectedSectors];

            container.innerHTML = '';
            sectors.forEach(sector => {
                const label = document.createElement('label');
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = sector;
                cb.checked = previousSelection.includes(sector);
                cb.onchange = onSectorChange;
                label.appendChild(cb);
                label.appendChild(document.createTextNode(getSectorLabel(sector)));
                container.appendChild(label);
            });

            _selectedSectors = _selectedSectors.filter(s => sectors.includes(s));
            updateSectorAnchorText();
        }

        function populateMarketSelector(data) {
            const container = document.getElementById('marketSelectorItems');
            const markets = [...new Set(data.map(r => r.code_market).filter(Boolean))].sort();

            const previousSelection = [..._selectedMarkets];

            container.innerHTML = '';
            markets.forEach(mkt => {
                const label = document.createElement('label');
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = mkt;
                cb.checked = previousSelection.includes(mkt);
                cb.onchange = onMarketChange;
                label.appendChild(cb);
                label.appendChild(document.createTextNode(mkt));
                container.appendChild(label);
            });

            _selectedMarkets = _selectedMarkets.filter(m => markets.includes(m));
            updateMarketAnchorText();
        }

        function renderTable(data) {
            _lastData = data;
            populateInstrumentSelector(data);
            const sectorItems = document.getElementById('sectorSelectorItems');
            if (sectorItems.children.length === 0 || (_selectedSectors.length === 0)) {
                populateSectorSelector(data);
            }
            populateMarketSelector(data);
            applyFiltersAndRender();
        }

        function applyFiltersAndRender() {
            const data = _lastData;
            const container = document.getElementById('table-container');
            const vMin = parseFloat(document.getElementById('value-min').value);
            const vMax = parseFloat(document.getElementById('value-max').value);
            const instrumentFilter = (document.getElementById('instrument-filter').value || '').trim().toLowerCase();
            const inversionFilter = document.getElementById('inversion-filter').checked;

            let filtered = data.filter(row => {
                const val = parseFloat(row.forza);
                if (isNaN(val)) return false;
                const absVal = Math.abs(val);
                if (!isNaN(vMin) && absVal < vMin) return false;
                if (!isNaN(vMax) && absVal > vMax) return false;
                if (instrumentFilter && (row.id_instrument || '').toLowerCase() !== instrumentFilter) return false;
                if (_selectedSectors.length > 0 && !_selectedSectors.includes(row.sector)) return false;
                if (_selectedMarkets.length > 0 && !_selectedMarkets.includes(row.code_market)) return false;

                if (inversionFilter) {
                    const fVal = parseFloat(row.forza);
                    const iVal = parseInt(row.invariance_days) || 0;
                    if (fVal >= 0 || iVal >= 0) return false;
                }

                return true;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<p>Nessun dato corrispondente ai filtri.</p>';
                return;
            }

            let html = `<p style="margin-bottom:10px">Record trovati: <strong>${filtered.length}</strong></p>`;
            html += `<table class="data-table"><thead><tr>
    <th>${getTranslation('id_instrument')}</th>
    <th>${getTranslation('instrument_description')}</th>
    <th>${getTranslation('sector')}</th>
    <th>${getTranslation('currency')}</th>
    <th>${getTranslation('date_start')}</th>
    <th>${getTranslation('int.force')}</th>
    <th>${getTranslation('int.invariance')}</th>
    <th style="text-align:right">${getTranslation('code_market') !== 'code_market' ? getTranslation('code_market') : 'Mercato'}</th>
</tr></thead><tbody>`;

            filtered.forEach(row => {
                const forzaVal = parseFloat(row.forza);
                const forzaStyle = forzaVal < 0 ? 'color: red; font-weight: bold;' : '';

                const invVal = parseInt(row.invariance_days) || 0;
                let invDisplay = invVal;
                let invStyle = '';
                if (invVal < 0) {
                    invStyle = 'color: red; font-weight: bold;';
                    invDisplay = `${invVal} (${getTranslation('int.invariance.negative')})`;
                } else if (invVal > 0) {
                    invDisplay = `${invVal} (${getTranslation('int.invariance.positive')})`;
                }

                const fmtNum = (v, decimals = 2) => {
                    if (v === null || v === undefined || v === 'None') return '-';
                    const n = parseFloat(v);
                    return isNaN(n) ? '-' : n.toLocaleString('it-IT', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
                };
                const fmtCap = (v) => {
                    return v ? String(v) : '-';
                };

                const tooltipHtml = `
                    <div class="inst-tooltip">
                        <table>
                            <tr><td>${getTranslation('instrument@volume')}</td><td>${fmtNum(row['instrument@volume'], 0)}</td></tr>
                            <tr><td>${getTranslation('price@close')}</td><td>${fmtNum(row['price@close'])}</td></tr>
                            <tr><td>${getTranslation('int.pe')}</td><td>${fmtNum(row.PE)}</td></tr>
                            <tr><td>${getTranslation('int.eps')}</td><td>${fmtNum(row.EPS)}</td></tr>
                            <tr><td>${getTranslation('int.market_cap')}</td><td>${fmtCap(row.market_capitalization)}</td></tr>
                        </table>
                    </div>`;

                html += `<tr>
                    <td><span class="inst-tooltip-anchor"><a href="#" onclick="openPriceGraph('${row.id_instrument}')" style="color:#000; text-decoration:underline;">${row.id_instrument}</a>${tooltipHtml}</span></td>
                    <td><a href="#" onclick="openInstrumentDetail('${row.id_instrument}')" style="color:#000; text-decoration:underline;">${row.instrument_description || '-'}</a></td>
                    <td>${row.sector ? getSectorLabel(row.sector) : '-'}</td>
                    <td style="text-align:right">${row.currency || '-'}</td>
                    <td style="text-align:right">${row.date_start}</td>
                    <td style="text-align:right; ${forzaStyle}">${row.forza}</td>
                    <td style="text-align:right; ${invStyle}">${invDisplay}</td>
                    <td style="text-align:right">${row.code_market || '-'}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            msgDiv.style.display = 'block';
        }

        function closeDashboard() {
            window.close();
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function openPriceGraph(instrumentId) {
            const url = `dashboard-graph-prices.html?id_instrument=${instrumentId}&username=${credentials.username}&token=${credentials.token}&instrument_currency=${credentials.currency}`;
            window.open(url, '_blank');
        }

        function openInstrumentDetail(instrumentId) {
            const url = `dashboard-detail-instrument.html?id_instrument=${instrumentId}&username=${credentials.username}&token=${credentials.token}&language=${credentials.language}&currency=${credentials.currency}`;
            window.open(url, '_blank', 'width=1200,height=800');
        }

        window.onload = init;
    </script>
</body>

</html>
