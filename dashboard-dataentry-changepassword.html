<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Change Password</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f5f0;
            --neon-cyan: #000000;
            --glass-bg: #ffffff;
            --text-color: #333333;
            --border-color: #000000;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', 'Times New Roman', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background: var(--glass-bg);
            padding: 40px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        .btn-group {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            background: #000;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #333;
        }

        .btn-secondary {
            background: transparent;
            color: #000;
        }

        .btn-secondary:hover {
            background: #eee;
        }

        .status-msg {
            margin-top: 20px;
            padding: 10px;
            text-align: center;
            display: none;
            font-weight: bold;
        }

        .status-error {
            color: var(--error-color);
        }

        .status-success {
            color: var(--success-color);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 id="headerTitle">Security</h1>
        <div class="form-group">
            <label class="form-label" id="emailLabel">Email / Username</label>
            <input type="text" id="email" class="form-input">
        </div>
        <div id="auth-fields">
            <div class="form-group">
                <label class="form-label" id="currentPassLabel">Current Password</label>
                <input type="password" id="current_password" class="form-input">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label" id="newPassLabel">New Password</label>
            <input type="password" id="new_password" class="form-input">
        </div>
        <div class="form-group">
            <label class="form-label" id="confirmPassLabel">Confirm New Password</label>
            <input type="password" id="confirm_password" class="form-input">
        </div>

        <div class="btn-group">
            <button class="btn" id="submitBtn" onclick="submitChange()">Change Password</button>
            <button class="btn btn-secondary" id="forgotBtn" onclick="forgotPassword()">Forgot Password? Reset via Email</button>
            <button class="btn btn-secondary" id="cancelBtn" onclick="goBack()">Cancel</button>
        </div>

        <div id="statusMsg" class="status-msg"></div>
    </div>

    <script>
        let language = 'en_UK';
        let translations = {};

        // Parse URL params
        const params = new URLSearchParams(window.location.search);
        const emailParam = params.get('email');
        const tokenParam = params.get('token'); // If from dashboard
        const usernameParam = params.get('username') || localStorage.getItem('username');

        if (emailParam) {
            document.getElementById('email').value = emailParam;
        } else if (usernameParam) {
            document.getElementById('email').value = usernameParam;
        }

        // Detect if authenticated (if opened from menu)
        const isAuthenticated = !!tokenParam || !!localStorage.getItem('token');
        
        async function loadTranslations() {
            const lang = localStorage.getItem('selectedLanguage') || 'en_UK';
            language = lang; // Update global variable
            try {
                const response = await fetch(`lang/${lang}.json`);
                translations = await response.json();
                applyTranslations();
            } catch (error) {
                console.error("Error loading translations:", error);
            }
        }

        function getTranslation(key) {
            return translations[key] || key;
        }

        function applyTranslations() {
            const isForgotMode = params.get('mode') === 'forgot';
            document.getElementById('headerTitle').textContent = getTranslation('sel.settings.change.password');
            document.getElementById('emailLabel').textContent = getTranslation('int.username');
            document.getElementById('currentPassLabel').textContent = getTranslation('int.password.current');
            document.getElementById('newPassLabel').textContent = getTranslation('int.password.new');
            document.getElementById('confirmPassLabel').textContent = getTranslation('int.password.confirm');
            
            if (isForgotMode) {
                document.getElementById('submitBtn').textContent = getTranslation('int.sendmail.changepassword') || 'Send reset email';
                // Hide specific fields if in forgot mode
                document.getElementById('auth-fields').style.display = 'none';
                document.getElementById('new_password').closest('.form-group').style.display = 'none';
                document.getElementById('confirm_password').closest('.form-group').style.display = 'none';
                document.getElementById('forgotBtn').style.display = 'none';
            } else {
                document.getElementById('submitBtn').textContent = getTranslation('int.update');
                document.getElementById('forgotBtn').textContent = getTranslation('int.forgot.password');
            }
            
            document.getElementById('cancelBtn').textContent = getTranslation('int.close');
        }

        function showStatus(text, type) {
            const msg = document.getElementById('statusMsg');
            msg.textContent = text;
            msg.className = 'status-msg ' + (type === 'success' ? 'status-success' : 'status-error');
            msg.style.display = 'block';
        }

        async function submitChange() {
            const isForgotMode = params.get('mode') === 'forgot';
            
            if (isForgotMode) {
                return forgotPassword();
            }

            const email = document.getElementById('email').value;
            const current_password = document.getElementById('current_password').value;
            const new_password = document.getElementById('new_password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            if (new_password !== confirm_password) {
                showStatus(getTranslation('int.password.mismatch') || 'Passwords do not match', 'error');
                return;
            }

            if (!new_password) {
                showStatus(getTranslation('int.field.required'), 'error');
                return;
            }

            const payload = {
                username: email,
                password: current_password,
                new_password: new_password
            };

            const apiBaseUser = "https://user-tunnel.fe-web.eu";
            
            try {
                const response = await fetch(`${apiBaseUser}/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (response.ok && data.status === 'ok') {
                    showStatus(getTranslation('int.info.saved'), 'success');
                    setTimeout(() => goBack(), 2000);
                } else {
                    showStatus(data.msg || 'Update failed', 'error');
                }
            } catch (err) {
                showStatus('Connection error', 'error');
            }
        }

        async function forgotPassword() {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showStatus(getTranslation('int.field.required'), 'error');
                return;
            }

            const apiBaseUser = "https://user-tunnel.fe-web.eu";
            
            try {
                const response = await fetch(`${apiBaseUser}/sendmailtoken`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: email, email: email, language: language })
                });

                const data = await response.json();
                if (response.ok && data.status === 'ok') {
                    showStatus(getTranslation('int.reset.email.sent'), 'success');
                } else {
                    showStatus(data.detail || 'Error sending token', 'error');
                }
            } catch (err) {
                showStatus('Connection error', 'error');
            }
        }

        function goBack() {
            if (window.opener || window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }

        loadTranslations();
    </script>
</body>

</html>
