<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financial Estimates 0.2 alfa - Log Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/icon-finest.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap');

        :root {
            --bg-color: #f5f5f0;
            --neon-cyan: #000000;
            --neon-blue: #333333;
            --glass-bg: #ffffff;
            --text-color: #333333;
            --border-color: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: var(--bg-color);
            padding: 20px;
            color: var(--text-color);
            min-height: 100vh;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-container.expanded {
            max-width: 100%;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .user-info-left {
            font-size: 14px;
            color: var(--neon-cyan);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5em;
        }

        .content-area {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: calc(100vh - 150px);
        }

        .files-panel {
            background: var(--glass-bg);
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow-y: auto;
            padding: 15px;
        }

        .log-list {
            list-style: none;
        }

        .log-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .log-item:hover {
            background: #f0f0f0;
        }

        .log-item.active {
            background: #333;
            color: #fff;
        }

        .log-viewer {
            background: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .viewer-header {
            background: #333;
            padding: 10px 20px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #000;
            flex-wrap: wrap;
            gap: 8px;
        }

        .viewer-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .viewer-header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* ── TOOLBAR FILTRI ── */
        .filter-toolbar {
            background: #2a2a2a;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border-bottom: 1px solid #444;
        }

        .filter-toolbar label {
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .filter-input {
            background: #1e1e1e;
            border: 1px solid #555;
            color: #d4d4d4;
            border-radius: 4px;
            padding: 5px 10px;
            font-family: 'Consolas', monospace;
            font-size: 0.82rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-input:focus {
            border-color: #888;
        }

        .filter-input::placeholder {
            color: #666;
        }

        #searchInput {
            width: 220px;
        }

        #moduleFilter {
            width: 160px;
        }

        #levelFilter {
            background: #1e1e1e;
            border: 1px solid #555;
            color: #d4d4d4;
            border-radius: 4px;
            padding: 5px 8px;
            font-family: 'Consolas', monospace;
            font-size: 0.82rem;
            outline: none;
            cursor: pointer;
        }

        #levelFilter option {
            background: #1e1e1e;
        }

        .filter-divider {
            width: 1px;
            height: 20px;
            background: #444;
        }

        /* Checkbox "una riga" */
        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-wrap input[type="checkbox"] {
            accent-color: #aaa;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        .toggle-wrap span {
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        /* Pulsante espandi */
        .btn-icon {
            background: none;
            border: 1px solid #555;
            color: #aaa;
            border-radius: 4px;
            padding: 5px 9px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .btn-icon:hover {
            background: #444;
            color: #fff;
        }

        .btn-icon.active-btn {
            background: #555;
            color: #fff;
            border-color: #888;
        }

        /* Contatore risultati filtrati */
        #filteredCount {
            font-size: 0.75rem;
            color: #888;
        }

        /* Highlight ricerca */
        .highlight {
            background: #ffcc00;
            color: #000;
            border-radius: 2px;
            padding: 0 1px;
        }

        .log-table-container {
            flex: 1;
            overflow: auto;
            padding: 10px;
        }

        .log-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .log-table th {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #444;
            color: #aaa;
            position: sticky;
            top: 0;
            background: #1e1e1e;
        }

        .log-table td {
            padding: 8px;
            border-bottom: 1px solid #2d2d2d;
            vertical-align: top;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Single-line mode: solo la colonna message viene troncata */
        .single-line .log-table td {
            white-space: nowrap;
        }

        .single-line .log-table td:last-child {
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 0;
        }

        .lvl-info {
            color: #569cd6;
            font-weight: bold;
        }

        .lvl-debug {
            color: #b5cea8;
            font-weight: bold;
        }

        .lvl-error {
            color: #f44747;
            font-weight: bold;
        }

        .lvl-warning {
            color: #ce9178;
            font-weight: bold;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #loadingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        /* Expanded layout */
        body.is-expanded .main-container {
            max-width: 100%;
        }

        body.is-expanded .content-area {
            height: calc(100vh - 100px);
        }

        /* ── DETAIL PANEL ── */
        #detailPanel {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 820px;
            max-width: calc(100vw - 40px);
            min-width: 360px;
            background: #1a1a1a;
            border: 1px solid #555;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.7);
            z-index: 200;
            display: flex;
            flex-direction: column;
            transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Consolas', 'Courier New', monospace;
            /* resize orizzontale tramite js; altezza gestita da resize-bar */
        }

        #detailPanel.open {
            transform: translateX(-50%) translateY(0);
        }

        /* Barra di resize in alto */
        .detail-resize-bar {
            height: 6px;
            background: #2a2a2a;
            border-radius: 10px 10px 0 0;
            cursor: ns-resize;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .detail-resize-bar::after {
            content: '';
            width: 40px;
            height: 3px;
            background: #555;
            border-radius: 2px;
        }

        .detail-handle {
            background: #2a2a2a;
            border-bottom: 1px solid #3a3a3a;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            gap: 10px;
        }

        .detail-handle-title {
            font-size: 0.76rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .detail-handle-title .badge {
            font-size: 0.7rem;
            padding: 2px 7px;
            border-radius: 3px;
            font-weight: bold;
        }

        /* Barra ricerca interna */
        .detail-search-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            max-width: 380px;
            background: #111;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 3px 8px;
        }

        .detail-search-bar i {
            color: #666;
            font-size: 0.75rem;
        }

        #detailSearchInput {
            background: none;
            border: none;
            outline: none;
            color: #d4d4d4;
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            flex: 1;
            min-width: 0;
        }

        #detailSearchInput::placeholder {
            color: #555;
        }

        .detail-search-nav {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .detail-search-count {
            font-size: 0.72rem;
            color: #777;
            white-space: nowrap;
            min-width: 48px;
            text-align: center;
        }

        .btn-nav {
            background: none;
            border: 1px solid #444;
            color: #aaa;
            border-radius: 3px;
            width: 22px;
            height: 22px;
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.12s;
        }

        .btn-nav:hover {
            background: #3a3a3a;
            color: #fff;
        }

        .btn-nav:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .detail-handle-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .detail-btn {
            background: none;
            border: 1px solid #555;
            color: #aaa;
            border-radius: 4px;
            padding: 3px 8px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .detail-btn:hover {
            background: #3a3a3a;
            color: #fff;
        }

        .detail-btn.active-btn {
            background: #444;
            color: #fff;
            border-color: #777;
        }

        .detail-meta {
            display: flex;
            gap: 24px;
            padding: 8px 14px;
            border-bottom: 1px solid #252525;
            flex-wrap: wrap;
            background: #1e1e1e;
        }

        .detail-meta-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .detail-meta-label {
            font-size: 0.62rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .detail-meta-value {
            font-size: 0.8rem;
            color: #ccc;
        }

        .detail-body {
            padding: 14px 16px;
            flex: 1;
            overflow-y: auto;
            color: #d4d4d4;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            min-height: 80px;
        }

        /* highlight ricerca nel detail */
        .detail-body .d-hi {
            background: #ffcc00;
            color: #000;
            border-radius: 2px;
            padding: 0 1px;
        }

        .detail-body .d-hi.d-hi-current {
            background: #ff8c00;
            color: #fff;
        }

        /* cursore pointer sulle righe */
        .log-table tbody tr {
            cursor: pointer;
        }

        .log-table tbody tr:hover td {
            background: rgba(255, 255, 255, 0.04);
        }

        .log-table tbody tr.row-selected td {
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>

<body>
    <div class="main-container" id="mainContainer">
        <div class="header-bar">
            <div class="user-info-left">
                <div><strong>Utente:</strong> <span id="usernameDisplay">-</span></div>
            </div>
            <h1>Log Viewer</h1>
            <div class="logout-container">
                <button onclick="window.location.href='dashboard.html'"
                    style="padding:8px 16px;background:#000;color:#fff;border:1px solid #000;border-radius:4px;cursor:pointer;">Chiudi</button>
            </div>
        </div>

        <div class="content-area">
            <!-- Pannello file -->
            <div class="files-panel">
                <h3 style="margin-bottom:15px;font-size:1rem;border-bottom:2px solid #000;padding-bottom:5px;">File Log
                </h3>
                <ul id="logFileList" class="log-list">
                    <p style="color:#666;font-size:0.9rem;">Caricamento...</p>
                </ul>
            </div>

            <!-- Viewer -->
            <div class="log-viewer" style="position:relative;">
                <div id="loadingOverlay">
                    <div class="spinner"></div>
                </div>

                <!-- Header: nome file + contatori + pulsante espandi -->
                <div class="viewer-header">
                    <div class="viewer-header-left">
                        <span id="currentFileName">Nessun file selezionato</span>
                        <span id="logCount"></span>
                        <span id="filteredCount"></span>
                    </div>
                    <div class="viewer-header-right">
                        <button class="btn-icon" id="btnExpand" title="Espandi / Comprimi" onclick="toggleExpand()">
                            <i class="fa fa-expand"></i> Espandi
                        </button>
                    </div>
                </div>

                <!-- Toolbar filtri -->
                <div class="filter-toolbar">
                    <!-- Ricerca testo -->
                    <label for="searchInput"><i class="fa fa-search"></i>&nbsp;Cerca</label>
                    <input id="searchInput" class="filter-input" type="text" placeholder="Testo nel messaggio…"
                        oninput="applyFilters()">

                    <div class="filter-divider"></div>

                    <!-- Filtro level -->
                    <label for="levelFilter"><i class="fa fa-tag"></i>&nbsp;Level</label>
                    <select id="levelFilter" onchange="applyFilters()">
                        <option value="">Tutti</option>
                        <option value="info">INFO</option>
                        <option value="debug">DEBUG</option>
                        <option value="warning">WARNING</option>
                        <option value="error">ERROR</option>
                    </select>

                    <div class="filter-divider"></div>

                    <!-- Filtro modulo -->
                    <label for="moduleFilter"><i class="fa fa-cube"></i>&nbsp;Modulo</label>
                    <input id="moduleFilter" class="filter-input" type="text" placeholder="Nome modulo…"
                        oninput="applyFilters()">

                    <div class="filter-divider"></div>

                    <!-- Checkbox singola riga -->
                    <label class="toggle-wrap" title="Mostra ogni messaggio su una sola riga">
                        <input type="checkbox" id="singleLineCheck" onchange="toggleSingleLine()">
                        <span><i class="fa fa-minus"></i>&nbsp;Riga singola</span>
                    </label>

                    <!-- Reset filtri -->
                    <button class="btn-icon" onclick="resetFilters()" title="Azzera filtri" style="margin-left:auto;">
                        <i class="fa fa-times"></i> Reset
                    </button>
                </div>

                <div class="log-table-container" id="logTableContainer">
                    <table class="log-table">
                        <thead>
                            <tr>
                                <th style="width:180px;">Timestamp</th>
                                <th style="width:80px;">Level</th>
                                <th style="width:150px;">Module</th>
                                <th>Message</th>
                            </tr>
                        </thead>
                        <tbody id="logContent">
                            <tr>
                                <td colspan="4" style="text-align:center;color:#666;padding:40px;">Seleziona un file
                                    dalla lista a sinistra</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ── DETAIL PANEL ── -->
    <div id="detailPanel">
        <!-- Resize handle in cima -->
        <div class="detail-resize-bar" id="detailResizeBar"></div>

        <!-- Header: titolo + ricerca + azioni -->
        <div class="detail-handle">
            <div class="detail-handle-title">
                <i class="fa fa-file-lines"></i>
                Dettaglio log
                <span class="badge" id="detailLevelBadge"></span>
            </div>

            <!-- Ricerca interna -->
            <div class="detail-search-bar">
                <i class="fa fa-search"></i>
                <input type="text" id="detailSearchInput" placeholder="Cerca nel messaggio…" oninput="detailSearch()">
                <div class="detail-search-nav">
                    <span class="detail-search-count" id="detailSearchCount"></span>
                    <button class="btn-nav" id="btnPrev" onclick="detailSearchNav(-1)" title="Precedente"><i
                            class="fa fa-chevron-up"></i></button>
                    <button class="btn-nav" id="btnNext" onclick="detailSearchNav(+1)" title="Successivo"><i
                            class="fa fa-chevron-down"></i></button>
                </div>
            </div>

            <div class="detail-handle-actions">
                <button class="detail-btn" id="btnDetailExpand" onclick="toggleDetailExpand()"
                    title="Allarga / Riduci pannello">
                    <i class="fa fa-expand-alt"></i> Allarga
                </button>
                <button class="detail-btn" onclick="closeDetail()"><i class="fa fa-times"></i> Chiudi</button>
            </div>
        </div>

        <!-- Meta -->
        <div class="detail-meta">
            <div class="detail-meta-item">
                <span class="detail-meta-label">Timestamp</span>
                <span class="detail-meta-value" id="detailTimestamp">—</span>
            </div>
            <div class="detail-meta-item">
                <span class="detail-meta-label">Level</span>
                <span class="detail-meta-value" id="detailLevel">—</span>
            </div>
            <div class="detail-meta-item">
                <span class="detail-meta-label">Module</span>
                <span class="detail-meta-value" id="detailModule">—</span>
            </div>
        </div>

        <!-- Corpo messaggio -->
        <div class="detail-body" id="detailMessage"></div>
    </div>

    <script>
        const API_URL_MARKET = "https://market-tunnel.fe-web.eu";
        const credentials = {
            username: localStorage.getItem('username'),
            token: localStorage.getItem('token'),
            language: localStorage.getItem('language') || 'it_IT'
        };

        let allLogs = [];      // tutti i log del file corrente
        let isExpanded = false;

        /* ────────────────────────── INIT ────────────────────────── */
        async function init() {
            if (!credentials.username) { window.location.href = 'index.html'; return; }
            document.getElementById('usernameDisplay').textContent = credentials.username;
            await fetchLogList();
        }

        /* ────────────────────────── LISTA FILE ────────────────────────── */
        async function fetchLogList() {
            const listEl = document.getElementById('logFileList');
            try {
                const response = await fetch(`${API_URL_MARKET}/getloglist`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: credentials.username, token: credentials.token, language: credentials.language })
                });
                const result = await response.json();
                if (result.status === 'ok') renderLogList(result.data);
                else listEl.innerHTML = `<p style="color:red;">Errore: ${result.msg}</p>`;
            } catch {
                listEl.innerHTML = `<p style="color:red;">Errore connessione</p>`;
            }
        }

        function renderLogList(files) {
            const listEl = document.getElementById('logFileList');
            if (!files.length) { listEl.innerHTML = '<p style="color:#666;">Nessun file log trovato.</p>'; return; }
            listEl.innerHTML = '';
            files.forEach(file => {
                const li = document.createElement('li');
                li.className = 'log-item';
                li.innerHTML = `<i class="fa-regular fa-file-lines"></i> <span>${file}</span>`;
                li.onclick = () => loadLogFile(file, li);
                listEl.appendChild(li);
            });
        }

        /* ────────────────────────── CARICA FILE ────────────────────────── */
        async function loadLogFile(filename, element) {
            document.querySelectorAll('.log-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('currentFileName').textContent = filename;
            resetFilters(false); // reset silenzioso

            try {
                const response = await fetch(`${API_URL_MARKET}/getlogfile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: credentials.username, token: credentials.token, language: credentials.language, filename })
                });
                const result = await response.json();
                if (result.status === 'ok') {
                    allLogs = result.data;
                    document.getElementById('logCount').textContent = `Voci: ${allLogs.length}`;
                    populateModuleSuggestions(allLogs);
                    applyFilters();
                } else {
                    document.getElementById('logContent').innerHTML =
                        `<tr><td colspan="4" style="color:red;padding:20px;">${result.msg}</td></tr>`;
                }
            } catch {
                document.getElementById('logContent').innerHTML =
                    `<tr><td colspan="4" style="color:red;padding:20px;">Errore caricamento file</td></tr>`;
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        /* ────────────────────────── SUGGERIMENTI MODULO ────────────────────────── */
        function populateModuleSuggestions(logs) {
            const datalist = document.getElementById('moduleSuggestions') || (() => {
                const dl = document.createElement('datalist');
                dl.id = 'moduleSuggestions';
                document.body.appendChild(dl);
                document.getElementById('moduleFilter').setAttribute('list', 'moduleSuggestions');
                return dl;
            })();
            const modules = [...new Set(logs.map(l => l.module).filter(Boolean))].sort();
            datalist.innerHTML = modules.map(m => `<option value="${m}">`).join('');
        }

        /* ────────────────────────── FILTRI ────────────────────────── */
        function applyFilters() {
            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            const level = document.getElementById('levelFilter').value.toLowerCase();
            const module = document.getElementById('moduleFilter').value.trim().toLowerCase();

            const filtered = allLogs.filter(log => {
                const lvlMatch = !level || log.level.toLowerCase().includes(level);
                const modMatch = !module || log.module.toLowerCase().includes(module);
                const searchMatch = !search || log.message.toLowerCase().includes(search) ||
                    log.module.toLowerCase().includes(search) ||
                    log.timestamp.toLowerCase().includes(search);
                return lvlMatch && modMatch && searchMatch;
            });

            renderLogs(filtered, search);

            const fc = document.getElementById('filteredCount');
            if (filtered.length !== allLogs.length) {
                fc.textContent = `(${filtered.length} filtrati)`;
                fc.style.color = '#ce9178';
            } else {
                fc.textContent = '';
            }
        }

        function resetFilters(rerender = true) {
            document.getElementById('searchInput').value = '';
            document.getElementById('levelFilter').value = '';
            document.getElementById('moduleFilter').value = '';
            if (rerender && allLogs.length) applyFilters();
        }

        /* ────────────────────────── RENDERING RIGHE ────────────────────────── */
        function renderLogs(logs, searchTerm = '') {
            const tbody = document.getElementById('logContent');
            tbody.innerHTML = '';

            if (!logs.length) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#666;padding:30px;">Nessun risultato trovato.</td></tr>';
                return;
            }

            const escRe = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const hiRe = searchTerm ? new RegExp(`(${escRe(searchTerm)})`, 'gi') : null;

            logs.forEach(log => {
                const tr = document.createElement('tr');
                let levelClass = '';
                const lv = log.level.toLowerCase();
                if (lv.includes('info')) levelClass = 'lvl-info';
                else if (lv.includes('debug')) levelClass = 'lvl-debug';
                else if (lv.includes('error')) levelClass = 'lvl-error';
                else if (lv.includes('warning')) levelClass = 'lvl-warning';

                const msgHtml = hiRe
                    ? escHtml(log.message).replace(hiRe, '<span class="highlight">$1</span>')
                    : escHtml(log.message);

                tr.innerHTML = `
                    <td style="color:#888;">${escHtml(log.timestamp)}</td>
                    <td class="${levelClass}">${escHtml(log.level)}</td>
                    <td style="color:#ce9178;">${escHtml(log.module)}</td>
                    <td>${msgHtml}</td>
                `;
                tr.addEventListener('click', () => openDetail(log, tr));
                tbody.appendChild(tr);
            });
        }

        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        /* ────────────────────────── DETAIL PANEL ────────────────────────── */
        let selectedRow = null;
        let currentLogData = null;
        let detailMatches = [];
        let detailMatchIdx = -1;
        let detailIsExpanded = false;

        function openDetail(log, tr) {
            if (selectedRow) selectedRow.classList.remove('row-selected');
            selectedRow = tr;
            tr.classList.add('row-selected');

            currentLogData = log;

            // Badge level
            const lv = log.level.toLowerCase();
            const badge = document.getElementById('detailLevelBadge');
            badge.textContent = log.level;
            badge.style.background = lv.includes('error') ? '#f44747' :
                lv.includes('warning') ? '#ce9178' :
                    lv.includes('info') ? '#569cd6' :
                        lv.includes('debug') ? '#b5cea8' : '#888';
            badge.style.color = '#000';

            document.getElementById('detailTimestamp').textContent = log.timestamp || '—';
            document.getElementById('detailLevel').textContent = log.level || '—';
            document.getElementById('detailModule').textContent = log.module || '—';

            // Svuota ricerca interna e mostra testo
            document.getElementById('detailSearchInput').value = '';
            detailMatches = [];
            detailMatchIdx = -1;
            document.getElementById('detailSearchCount').textContent = '';
            document.getElementById('detailMessage').innerHTML = escHtml(log.message || '—');

            document.getElementById('detailPanel').classList.add('open');
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('open');
            if (selectedRow) { selectedRow.classList.remove('row-selected'); selectedRow = null; }
            // reset expanded
            if (detailIsExpanded) toggleDetailExpand();
        }

        /* ── Allarga / riduci il pannello ── */
        function toggleDetailExpand() {
            detailIsExpanded = !detailIsExpanded;
            const panel = document.getElementById('detailPanel');
            const btn = document.getElementById('btnDetailExpand');
            if (detailIsExpanded) {
                panel.style.width = 'calc(100vw - 40px)';
                panel.style.maxWidth = 'calc(100vw - 40px)';
                btn.innerHTML = '<i class="fa fa-compress-alt"></i> Riduci';
                btn.classList.add('active-btn');
            } else {
                panel.style.width = '820px';
                panel.style.maxWidth = 'calc(100vw - 40px)';
                btn.innerHTML = '<i class="fa fa-expand-alt"></i> Allarga';
                btn.classList.remove('active-btn');
            }
        }

        /* ── Ricerca interna ── */
        function detailSearch() {
            const term = document.getElementById('detailSearchInput').value;
            const body = document.getElementById('detailMessage');
            const raw = currentLogData ? (currentLogData.message || '') : '';

            if (!term) {
                body.innerHTML = escHtml(raw);
                detailMatches = [];
                detailMatchIdx = -1;
                document.getElementById('detailSearchCount').textContent = '';
                updateDetailNavBtns();
                return;
            }

            // Costruisci HTML con mark
            const escRe = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const re = new RegExp(`(${escRe})`, 'gi');
            body.innerHTML = escHtml(raw).replace(re, '<mark class="d-hi">$1</mark>');

            detailMatches = Array.from(body.querySelectorAll('mark.d-hi'));
            detailMatchIdx = detailMatches.length > 0 ? 0 : -1;

            applyDetailMatchCurrent();
            updateDetailNavBtns();
        }

        function detailSearchNav(dir) {
            if (!detailMatches.length) return;
            detailMatchIdx = (detailMatchIdx + dir + detailMatches.length) % detailMatches.length;
            applyDetailMatchCurrent();
        }

        function applyDetailMatchCurrent() {
            detailMatches.forEach((m, i) => {
                m.classList.toggle('d-hi-current', i === detailMatchIdx);
            });
            if (detailMatchIdx >= 0 && detailMatches[detailMatchIdx]) {
                detailMatches[detailMatchIdx].scrollIntoView({ block: 'nearest' });
            }
            const count = document.getElementById('detailSearchCount');
            count.textContent = detailMatches.length
                ? `${detailMatchIdx + 1}/${detailMatches.length}`
                : '0 ris.';
        }

        function updateDetailNavBtns() {
            const has = detailMatches.length > 0;
            document.getElementById('btnPrev').disabled = !has;
            document.getElementById('btnNext').disabled = !has;
        }

        /* ── Resize verticale con drag ── */
        (function initDetailResize() {
            const bar = document.getElementById('detailResizeBar');
            const panel = document.getElementById('detailPanel');
            let startY, startH;

            bar.addEventListener('mousedown', e => {
                startY = e.clientY;
                startH = panel.offsetHeight;
                document.body.style.userSelect = 'none';

                const onMove = ev => {
                    const delta = startY - ev.clientY;
                    const newH = Math.max(140, Math.min(window.innerHeight - 60, startH + delta));
                    panel.style.height = newH + 'px';
                };
                const onUp = () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    document.body.style.userSelect = '';
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        })();

        /* ────────────────────────── SINGLE LINE ────────────────────────── */
        function toggleSingleLine() {
            const container = document.getElementById('logTableContainer');
            container.classList.toggle('single-line', document.getElementById('singleLineCheck').checked);
        }

        /* ────────────────────────── ESPANDI ────────────────────────── */
        function toggleExpand() {
            isExpanded = !isExpanded;
            document.body.classList.toggle('is-expanded', isExpanded);
            const btn = document.getElementById('btnExpand');
            if (isExpanded) {
                btn.innerHTML = '<i class="fa fa-compress"></i> Comprimi';
                btn.classList.add('active-btn');
            } else {
                btn.innerHTML = '<i class="fa fa-expand"></i> Espandi';
                btn.classList.remove('active-btn');
            }
        }

        window.onload = init;
    </script>
</body>

</html>
